// --- ARABIC LEARNING -------------------------------------------
function ArabicScreen({player,onUpdatePlayer,onBack}){
  const theme=player.settings?.theme||"dark";
  const [selLevel,setSelLevel]=useState(null);
  const [cardIdx,setCardIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [particles,setParticles]=useState(false);
  const prog=player.arabicProgress||{};

  if(!selLevel){
    return(
      <div style={getBg(theme)}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px 8px"}}>
          <button style={S.backBtn} onClick={onBack}>←</button>
          <h2 style={{color:"#FFD700",fontSize:18,margin:0}}>Арабский язык</h2>
        </div>
        <div style={{padding:"0 16px"}}>
          <div style={{background:"rgba(255,215,0,.08)",border:"1px solid rgba(255,215,0,.2)",borderRadius:12,padding:"12px 14px",marginBottom:16}}>
            <p style={{color:"#FFF9C4",fontSize:13,margin:0,lineHeight:1.5}}>
              Нажми на карточку  -  увидишь перевод. Изучай буквы, правила таджвида и слова из Корана!
            </p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {ARABIC_LEVELS.map((lvl,i)=>{
              const done=prog[lvl.id]||0;
              const total=lvl.cards.length;
              const pct=Math.round((done/total)*100);
              return(
                <div key={i} style={{background:THEMES[theme].card,border:`1px solid ${THEMES[theme].border}`,borderRadius:14,padding:"14px 16px",cursor:"pointer"}} onClick={()=>{setSelLevel(lvl);setCardIdx(0);setFlipped(false);SFX.click();}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div>
                      <p style={{color:"#E0E0E0",fontWeight:"bold",fontSize:14,margin:0}}>{lvl.title}</p>
                      <p style={{color:"#78909C",fontSize:12,margin:"2px 0 0"}}>{lvl.desc}</p>
                    </div>
                    <span style={{color:pct===100?"#4CAF50":"#FFD700",fontSize:13,fontWeight:"bold"}}>{pct}%</span>
                  </div>
                  <div style={{height:4,background:"rgba(255,255,255,.08)",borderRadius:2}}>
                    <div style={{height:4,borderRadius:2,background:pct===100?"#4CAF50":"#FFD700",width:`${pct}%`,transition:"width .5s"}}/>
                  </div>
                  <p style={{color:"#546E7A",fontSize:11,margin:"6px 0 0"}}>{done}/{total} карточек</p>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  const card=selLevel.cards[cardIdx];
  const isLast=cardIdx===selLevel.cards.length-1;

  const nextCard=()=>{
    SFX.arabic();setFlipped(false);
    const newProg={...prog,[selLevel.id]:Math.max(prog[selLevel.id]||0,cardIdx+1)};
    if(cardIdx+1>=selLevel.cards.length){
      setParticles(true);SFX.levelUp();
      const ach=[...player.achievements];
      if(!ach.includes("arabic_complete"))ach.push("arabic_complete");
      onUpdatePlayer({...player,arabicProgress:newProg,achievements:ach,nur:player.nur+50});
      setSelLevel(null);
    } else {
      setCardIdx(i=>i+1);
      onUpdatePlayer({...player,arabicProgress:newProg});
    }
  };

  return(
    <div style={getBg(theme)}>
      {particles&&<Particles type="correct" onDone={()=>setParticles(false)}/>}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px 8px"}}>
        <button style={S.backBtn} onClick={()=>{setSelLevel(null);SFX.click();}}>←</button>
        <div style={{flex:1}}>
          <p style={{color:"#FFD700",fontSize:14,margin:0,fontWeight:"bold"}}>{selLevel.title}</p>
          <p style={{color:"#78909C",fontSize:11,margin:0}}>{cardIdx+1}/{selLevel.cards.length}</p>
        </div>
      </div>
      <div style={{height:4,background:"rgba(255,255,255,.08)",margin:"0 16px 20px"}}>
        <div style={{height:4,background:"linear-gradient(90deg,#FFD700,#FFA000)",width:`${((cardIdx+1)/selLevel.cards.length)*100}%`,transition:"width .4s",borderRadius:2}}/>
      </div>
      <div style={{padding:"0 16px",textAlign:"center"}}>
        {/* Flashcard */}
        <div
          style={{background:flipped?"rgba(255,215,0,.12)":"rgba(255,255,255,.06)",border:`2px solid ${flipped?"rgba(255,215,0,.5)":"rgba(255,255,255,.15)"}`,borderRadius:24,padding:"40px 24px",minHeight:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .3s",marginBottom:20,animation:flipped?"arabicPop .3s ease":""}} onClick={()=>{setFlipped(!flipped);SFX.arabic();}}>
          {!flipped?(
            <>
              <p style={{fontSize:64,color:"#FFD700",fontFamily:"serif",margin:"0 0 12px",lineHeight:1}}>{card.front}</p>
              <p style={{color:"#546E7A",fontSize:13,margin:0}}>Нажми, чтобы узнать значение</p>
            </>
          ):(
            <>
              <p style={{fontSize:64,color:"#FFD700",fontFamily:"serif",margin:"0 0 16px",lineHeight:1}}>{card.front}</p>
              <p style={{color:"#FFF9C4",fontSize:18,margin:0,fontWeight:"bold"}}>{card.back}</p>
            </>
          )}
        </div>
        <div style={{display:"flex",gap:12}}>
          {cardIdx>0&&<button style={{...S.primaryBtn,background:"#37474F",flex:1,marginTop:0}} onClick={()=>{setCardIdx(i=>i-1);setFlipped(false);SFX.click();}}>Назад</button>}
          <button style={{...S.primaryBtn,flex:2,marginTop:0,background:isLast?"linear-gradient(135deg,#4CAF50,#388E3C)":"linear-gradient(135deg,#1976D2,#1565C0)"}} onClick={nextCard}>
            {isLast?"Завершить уровень +50 Нур":"Следующая"}
          </button>
        </div>
        <p style={{color:"#546E7A",fontSize:12,marginTop:12,textAlign:"center"}}>Карточка {cardIdx+1} из {selLevel.cards.length}</p>
      </div>
    </div>
  );
}

// --- LEADERBOARD -----------------------------------------------
function LeaderboardScreen({player,onBack}){
  const theme=player.settings?.theme||"dark";
  const [selLeague,setSelLeague]=useState(()=>getLeague(player.nur).id);
  const players=JSON.parse(localStorage.getItem("nur_players")||"[]");
  const all=[...MOCK_LB,...players.filter(p=>!MOCK_LB.find(m=>m.name===p.name)).map(p=>({name:p.name,nur:p.nur,streak:p.streak||0,lastActive:p.lastLogin||Date.now()}))].sort((a,b)=>b.nur-a.nur);
  const league=LEAGUES.find(l=>l.id===selLeague)||LEAGUES[0];
  const inLeague=all.filter(p=>p.nur>=league.minNur&&p.nur<=(league.maxNur===Infinity?999999:league.maxNur));
  const myPos=all.findIndex(p=>p.name===player.name);
  const myInLeague=inLeague.findIndex(p=>p.name===player.name);
  const myDays=Math.floor((Date.now()-(player.lastLogin||Date.now()))/86400000);
  const overtakers=all.filter((p,i)=>i<myPos&&p.lastActive&&Math.floor((Date.now()-p.lastActive)/86400000)<2&&p.name!==player.name).slice(0,2);
  return(
    <div style={getBg(theme)}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px 8px"}}>
        <button style={S.backBtn} onClick={onBack}>←</button>
        <h2 style={{color:"#FFD700",fontSize:18,margin:0}}>Рейтинг и Лиги</h2>
      </div>
      <div style={{padding:"0 16px"}}>
        {/* League tabs */}
        <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
          {LEAGUES.map(l=>(
            <button key={l.id} style={{flexShrink:0,padding:"6px 12px",background:selLeague===l.id?l.bg:"rgba(255,255,255,.04)",border:`${selLeague===l.id?2:1}px solid ${selLeague===l.id?l.color:"rgba(255,255,255,.1)"}`,borderRadius:20,cursor:"pointer",color:selLeague===l.id?l.color:"#78909C",fontSize:12,fontFamily:"inherit"}} onClick={()=>{setSelLeague(l.id);SFX.click();}}>
              {l.name}
            </button>
          ))}
        </div>
        {/* My position */}
        {myPos>=0&&(
          <div style={{background:getLeague(player.nur).bg,border:`1px solid ${getLeague(player.nur).color}44`,borderRadius:14,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <p style={{color:"#B0BEC5",fontSize:11,margin:0}}>Ваше место (глобал)</p>
              <p style={{color:"#FFD700",fontSize:22,fontWeight:"bold",margin:0,fontFamily:"serif"}}>#{myPos+1}</p>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{color:getLeague(player.nur).color,fontSize:13,margin:0,fontWeight:"bold"}}>{getLeague(player.nur).name}</p>
              <p style={{color:"#4CAF50",fontSize:12,margin:0}}>Нур: {player.nur}</p>
            </div>
          </div>
        )}
        {/* Warnings */}
        {myDays>=1&&overtakers.length>0&&(
          <div style={{background:"rgba(255,82,82,.1)",border:"1px solid rgba(255,82,82,.35)",borderRadius:12,padding:"10px 14px",marginBottom:10,animation:"dropWarn .4s ease"}}>
            <p style={{color:"#FF5252",fontWeight:"bold",fontSize:13,margin:"0 0 3px"}}>Вас обгоняют!</p>
            <p style={{color:"#EF9A9A",fontSize:12,margin:0}}>{overtakers.map(p=>p.name).join(" и ")} обогнали вас. Играйте сейчас!</p>
          </div>
        )}
        {/* Podium for selected league */}
        <p style={{color:"#78909C",fontSize:12,margin:"0 0 10px"}}>{league.name} · Бонус x{league.bonus}</p>
        {inLeague.length>0&&(
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:8,marginBottom:16,height:100}}>
            {[1,0,2].map(pos=>{
              const p=inLeague[pos];if(!p)return null;
              const hs={0:90,1:70,2:55};const cs={0:league.color,1:"#B0BEC5",2:"#CD7F32"};
              return(
                <div key={pos} style={{textAlign:"center",width:80}}>
                  <div style={{fontSize:11,color:"#CFD8DC",margin:"0 0 2px",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{p.name}</div>
                  <div style={{background:cs[pos]+"22",border:`2px solid ${cs[pos]}`,borderRadius:"8px 8px 0 0",height:hs[pos],display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",padding:5}}>
                    <span style={{color:cs[pos],fontWeight:"bold",fontSize:13}}>{["I","II","III"][pos]}</span>
                    <span style={{fontSize:9,color:"#90A4AE"}}>{p.nur.toLocaleString()}</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {/* League list */}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {inLeague.slice(0,15).map((p,i)=>{
            const isMe=p.name===player.name;
            const inactive=p.lastActive&&Math.floor((Date.now()-p.lastActive)/86400000)>=7;
            const active2=p.lastActive&&Math.floor((Date.now()-p.lastActive)/86400000)<1;
            return(
              <div key={i} style={{borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,background:isMe?"rgba(255,215,0,.1)":"rgba(255,255,255,.04)",border:isMe?"1px solid #FFD70044":"1px solid transparent"}}>
                <span style={{color:i<3?league.color:"#546E7A",fontWeight:"bold",minWidth:24,fontSize:13,fontFamily:"serif"}}>{i===0?"I":i===1?"II":i===2?"III":"#"+(i+1)}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <p style={{color:isMe?"#FFD700":"#CFD8DC",margin:0,fontSize:14,fontWeight:isMe?"bold":"normal"}}>{p.name}</p>
                    {active2&&<span style={{fontSize:9,color:"#4CAF50",background:"rgba(76,175,80,.15)",borderRadius:4,padding:"1px 4px"}}>активен</span>}
                    {inactive&&<span style={{fontSize:9,color:"#FF5252",background:"rgba(255,82,82,.12)",borderRadius:4,padding:"1px 4px"}}>нет акт.</span>}
                  </div>
                  <p style={{color:"#546E7A",margin:0,fontSize:11}}>{getRank(p.nur).title} · Серия {p.streak||0}дн</p>
                </div>
                <span style={{color:"#90A4AE",fontSize:13}}>{p.nur.toLocaleString()}</span>
              </div>
            );
          })}
          {inLeague.length===0&&<p style={{color:"#546E7A",textAlign:"center",fontSize:13}}>Нет игроков в этой лиге</p>}
        </div>
      </div>
    </div>
  );
}

// SVG-иконки для каждого сокровища
function GemIcon({type,size=60,has=true}){
  const tt=TREASURE_TYPES[type]||TREASURE_TYPES.pearl;
  const c=has?tt.color:"#37474F";
  const g=has?tt.glow:"#546E7A";
  const s=size;
  const gems={
    pearl:(
      <svg width={s} height={s} viewBox="0 0 60 60">
        <defs>
          <radialGradient id={`pg${size}`} cx="35%" cy="30%">
            <stop offset="0%" stopColor={has?"#FFFFFF":"#546E7A"}/>
            <stop offset="40%" stopColor={has?"#E8E8E8":"#37474F"}/>
            <stop offset="100%" stopColor={c}/>
          </radialGradient>
        </defs>
        <circle cx="30" cy="30" r="24" fill={`url(#pg${size})`} stroke={c} strokeWidth="1.5"/>
        <ellipse cx="23" cy="22" rx="6" ry="4" fill="rgba(255,255,255,.5)" transform="rotate(-30 23 22)"/>
        {has&&<circle cx="30" cy="30" r="24" fill="none" stroke={g} strokeWidth="0.5" opacity="0.6"/>}
      </svg>
    ),
    sapphire:(
      <svg width={s} height={s} viewBox="0 0 60 60">
        <defs>
          <linearGradient id={`sg${size}`} x1="0%" y1="0%" x2="100%" y2="100%">

function SettingsScreen({player,onUpdatePlayer,onBack}){

export default function NurGameV5(){
  const [player,setPlayer]=useState(null);
  const [screen,setScreen]=useState("home");
  useEffect(()=>{
    const cn=localStorage.getItem("nur_current");
    if(cn){const ps=JSON.parse(localStorage.getItem("nur_players")||"[]");const f=ps.find(p=>p.name===cn);if(f){SFX.muted=f.settings?.sound===false;setPlayer(f);}}
  },[]);
  const update=useCallback(up=>{
    setPlayer(up);SFX.muted=up.settings?.sound===false;
    const ps=JSON.parse(localStorage.getItem("nur_players")||"[]");
    const i=ps.findIndex(p=>p.name===up.name);
    if(i>=0)ps[i]=up;else ps.push(up);
    localStorage.setItem("nur_players",JSON.stringify(ps));
  },[]);
  const logout=()=>{localStorage.removeItem("nur_current");setPlayer(null);setScreen("home");};
  if(!player)return <AuthScreen onLogin={p=>{setPlayer(p);setScreen("home");}}/>;
  const theme=player.settings?.theme||"dark";
  const props={player,onUpdatePlayer:update,onBack:()=>setScreen("home")};
  if(screen==="quiz")return <QuizScreen {...props}/>;
  if(screen==="zikr")return <ZikrScreen {...props}/>;
  if(screen==="salawat")return <SalawatScreen {...props}/>;
  if(screen==="daily")return <DailyTasksScreen {...props} onNav={sc=>{setScreen(sc);}}/>;
  if(screen==="hadith_daily")return <HadithScreen {...props}/>;
  if(screen==="dua")return <DuaScreen {...props}/>;
  if(screen==="jaushan")return <JaushanScreen {...props}/>;
  if(screen==="arabic")return <ArabicScreen {...props}/>;
  if(screen==="leaderboard")return <LeaderboardScreen {...props}/>;
  if(screen==="achievements")return <AchievementsScreen {...props}/>;
  if(screen==="profile")return <ProfileScreen {...props}/>;
  if(screen==="treasury")return <TreasuryScreen {...props}/>;
  if(screen==="settings")return <SettingsScreen {...props}/>;
  return <HomeScreen player={player} onNav={setScreen} onLogout={logout}/>;
}
