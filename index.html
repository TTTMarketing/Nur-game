// --- SOUND ENGINE ---------------------------------------------
const SFX = {
  ctx:null, muted:false,
  init(){ if(!this.ctx) this.ctx=new (window.AudioContext||window.webkitAudioContext)(); },
  tone(freq,dur,type="sine",gain=0.3){
    if(this.muted)return;
    try{
      this.init();
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.connect(g);g.connect(this.ctx.destination);
      o.type=type;o.frequency.value=freq;
      g.gain.setValueAtTime(gain,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
      o.start();o.stop(this.ctx.currentTime+dur);
    }catch(e){}
  },
  correct(){this.tone(523,.1);setTimeout(()=>this.tone(659,.1),100);setTimeout(()=>this.tone(784,.2),200);setTimeout(()=>this.tone(1047,.3),350);},
  wrong(){this.tone(200,.15,"sawtooth",.2);setTimeout(()=>this.tone(150,.3,"sawtooth",.15),150);},
  levelUp(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.tone(f,.18),i*100));},
  coin(){this.tone(880,.08);setTimeout(()=>this.tone(1320,.12),80);},
  click(){this.tone(440,.05,"sine",.15);},
  zikr(){this.tone(528,.12,"sine",.2);setTimeout(()=>this.tone(396,.1),120);},
  superBonus(){[261,329,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone(f,.2),i*80));},
  league(){[400,500,600,800,1000].forEach((f,i)=>setTimeout(()=>this.tone(f,.25),i*120));},
  arabic(){this.tone(660,.15);setTimeout(()=>this.tone(880,.2),160);}
};

  {id:"su9",cat:"sunnah",age:"all",diff:"easy",q:"Что говорить при чихании?",opts:["БисмиллАх","АльхамдулиллАх","СубханАллах","АстагфируллАх"],ans:1,exp:"Чихнувший говорит «АльхамдулиллАх». Услышавший: «ЯрхамукаллАх» (помилуй тебя Аллах). Чихнувший в ответ: «ЯхдикумуллАх» (направит вас Аллах)."},
  {id:"su10",cat:"sunnah",age:"all",diff:"easy",q:"Что сказать при подъёме с постели утром?",opts:["Молчать","АльхамдулиллАхи аллази ахьяна","БисмиллАх","ИншааллАх"],ans:1,exp:"Сунна: «Аль-хамду лиллахи аллази ахьяна баъда ма аматана уа иляйхи-н-нушур»  -  Хвала Аллаху, оживившему нас после смерти (сна)."},
  {id:"su11",cat:"sunnah",age:"all",diff:"easy",q:"Сколько фиников желательно есть утром натощак (по Сунне)?",opts:["Любое чётное","7 нечётное","10","20"],ans:1,exp:"Пророк ﷺ ел по утрам нечётное количество фиников  -  обычно 7. Это защищает от яда и колдовства в этот день (хадис аль-Бухари)."},
  {id:"su12",cat:"sunnah",age:"all",diff:"easy",q:"Какое приветствие лучше использовать при встрече?",opts:["Привет","Здравствуй","Ас-саляму алейкум","Любое"],ans:2,exp:"Сунна  -  приветствовать словами «Ас-саляму алейкум уа рахматуллахи уа баракатух» (мир вам, милость Аллаха и Его благословение)."},
  {id:"su13",cat:"sunnah",age:"all",diff:"medium",q:"Сколько раз желательно мыть руки перед едой?",opts:["1","2 раза до и после","3","Не имеет значения"],ans:1,exp:"Сунна  -  мыть руки до еды и после неё. Пророк ﷺ сказал, что барака (благодать) пищи  -  в мытье рук до и после."},
  {id:"su14",cat:"sunnah",age:"all",diff:"medium",q:"Что нежелательно (макрух) делать во время еды?",opts:["Сидеть на земле","Облокачиваться","Есть руками","Есть с другими"],ans:1,exp:"Пророк ﷺ говорил: «Я не ем облокачиваясь». Сунна  -  есть сидя прямо или на коленях, проявляя смирение перед даром Аллаха."},
  {id:"su15",cat:"sunnah",age:"all",diff:"medium",q:"Что Сунна делать каждую пятницу?",opts:["Поститься","Купаться (гусль), чистить одежду, читать суру Аль-Кахф","Не работать","Не разговаривать"],ans:1,exp:"Пятница  -  лучший день недели. Сунна: гусль, чистая одежда, использование благовоний, чтение Аль-Кахф, увеличение салавата."},
  {id:"su16",cat:"sunnah",age:"all",diff:"medium",q:"Какое количество дуа Сунна повторять при выходе из дома?",opts:["1","3","7","Только при необходимости"],ans:0,exp:"Сунна перед выходом: «Бисмиллахи таваккальту аляллахи, ля хавля уа ля куввата илля биллах». Кто скажет  -  будет защищён."},
  {id:"su17",cat:"sunnah",age:"all",diff:"medium",q:"Какая Сунна связана с зубами?",opts:["Чистить только утром","Использовать сивак (особенно перед намазом)","Не чистить зубы","Чистить только перед едой"],ans:1,exp:"Пророк ﷺ часто использовал сивак (мисвак). Он говорил: «Если бы не было трудно для уммы, я бы повелел сивак с каждым намазом»."},
  {id:"su18",cat:"sunnah",age:"all",diff:"medium",q:"Что по Сунне нужно делать перед сном?",opts:["Оставить дверь открытой","Закрыть двери, накрыть посуду, упомянуть имя Аллаха","Выключить свет и молчать","Читать только Аят аль-Курси"],ans:1,exp:"Сунна перед сном: закрыть двери, накрыть посуду с едой, упомянуть имя Аллаха (БисмиллАх). Это защита от шайтана (аль-Бухари)."},
  {id:"su19",cat:"sunnah",age:"all",diff:"medium",q:"Что Сунна делать при входе в новый дом?",opts:["Ничего","Сделать дуа и пожертвовать","Только освятить","Пригласить гостей"],ans:1,exp:"При въезде в новый дом Сунна  -  поминать Аллаха, делать дуа за барака в этом доме, можно угостить нуждающихся."},
  {id:"su20",cat:"sunnah",age:"all",diff:"hard",q:"В каком положении Сунна пить воду?",opts:["Стоя","Сидя","Лёжа","Без разницы"],ans:1,exp:"Сунна  -  пить сидя. Пророк ﷺ запретил пить стоя. Но если есть необходимость (как при Замзаме)  -  допустимо."},
  {id:"su21",cat:"sunnah",age:"all",diff:"easy",q:"Что Сунна сказать перед сном?",opts:["БисмиллАх","Аят аль-Курси","Все суры Корана","Бисмика Аллахумма амуту уа ахья"],ans:3,exp:"Сунна: «Бисмика Аллахумма амуту уа ахья» (С Твоим именем, о Аллах, я умираю и оживаю). Также читать Аят аль-Курси и три последние суры."},
  {id:"su23",cat:"sunnah",age:"all",diff:"medium",q:"Какое самое лучшее время для дуа?",opts:["После Фаджра","Последняя треть ночи","Между Магриб и Иша","Перед сном"],ans:1,exp:"Лучшее время для дуа  -  последняя треть ночи. Аллах нисходит на ближнее небо и говорит: «Кто просит  -  отвечу»."},
  {id:"su24",cat:"sunnah",age:"all",diff:"hard",q:"Что отличает в одежде Сунну для мужчин?",opts:["Должна быть белой","Не быть ниже щиколоток (исбал)","Должна быть дорогой","Должна быть длинной"],ans:1,exp:"Мужская одежда не должна быть ниже щиколоток (исбал)  -  это запрещено хадисом. Лучший цвет  -  белый. Запрещён шёлк и золото."},
  {id:"su25",cat:"sunnah",age:"all",diff:"easy",q:"Какая Сунна при встрече с мусульманином?",opts:["Дать денег","Приветствовать первым","Не смотреть","Подождать"],ans:1,exp:"«Тот, кто первым приветствует  -  тот лучше». Сунна: приветствовать улыбкой, отвечать ещё лучшим приветствием."},
];

// --- АДАБ И АХЛАК (Этика) --------------------------------------

  {id:"ah3",cat:"ahlaq",age:"all",diff:"easy",q:"Что является основой нравственности в Исламе?",opts:["Богатство","Знание","Богобоязненность (таква)","Происхождение"],ans:2,exp:"Аллах сказал: «Воистину, наиболее почитаемый перед Аллахом среди вас  -  наиболее богобоязненный» (49:13)."},

  {id:"ah5",cat:"ahlaq",age:"all",diff:"easy",q:"Какое качество называется «лицемерием» (нифак)?",opts:["Скромность","Внешнее проявление веры при внутреннем неверии","Бережливость","Терпение"],ans:1,exp:"Нифак  -  лицемерие. Признаки: ложь, нарушение обещаний, предательство доверия. Это страшный грех."},
  {id:"ah6",cat:"ahlaq",age:"all",diff:"medium",q:"Что такое «рийа» (показуха)?",opts:["Похвальба","Поклонение ради показа людям","Богатство","Знание"],ans:1,exp:"Рийа  -  совершение поклонения ради того, чтобы видели люди. Это малый ширк, который аннулирует награду за дело."},
  {id:"ah7",cat:"ahlaq",age:"all",diff:"medium",q:"Что лучше  -  давать милостыню тайно или открыто?",opts:["Только тайно","Только открыто","Тайно лучше, но открыто может быть полезно для примера","Не имеет значения"],ans:2,exp:"Лучше тайно  -  это очищает от рийа. Но открыто допустимо для побуждения других. Сура Аль-Бакара (2:271) рассматривает оба варианта."},
  {id:"ah8",cat:"ahlaq",age:"all",diff:"medium",q:"Какое нравственное качество выше  -  справедливость или ихсан?",opts:["Справедливость","Ихсан (доброделание)","Они равны","Зависит"],ans:1,exp:"Справедливость  -  давать должное. Ихсан  -  давать больше, чем должно, прощать. Это высшая степень. «Аллах любит делающих ихсан»."},
  {id:"ah9",cat:"ahlaq",age:"all",diff:"easy",q:"Сколько прав соседа в Исламе?",opts:["3","5","Много","Только не вредить"],ans:2,exp:"Прав соседа много: не вредить, помогать в нужде, навещать в болезни, приходить на похороны, поздравлять с радостью, утешать в горе, делиться едой."},
  {id:"ah10",cat:"ahlaq",age:"all",diff:"medium",q:"Что хуже  -  сказать ложь шуткой или серьёзно?",opts:["Серьёзно хуже","И то и то одинаково запрещено","Шуткой можно","Зависит"],ans:1,exp:"Пророк ﷺ предостерёг от лжи даже в шутку. «Горе тому, кто говорит и лжёт, чтобы рассмешить людей» (Абу Дауд)."},
  {id:"ah11",cat:"ahlaq",age:"all",diff:"easy",q:"Что говорит Ислам о проявлении гнева?",opts:["Гневаться нормально","Управлять гневом  -  признак силы веры","Гнев не существует","Гнев полезен"],ans:1,exp:"«Сильный  -  тот, кто сдерживает себя в гневе» (аль-Бухари). При гневе: сесть/лечь, сделать вуду, замолчать."},
  {id:"ah12",cat:"ahlaq",age:"all",diff:"medium",q:"Какая Сунна при ссоре с братом по вере?",opts:["Не разговаривать вечно","Помириться в течение 3 дней","Жаловаться другим","Месть"],ans:1,exp:"Нельзя разрывать отношения с братом по вере более 3 дней. «Лучший из вас  -  тот, кто первым здоровается» (аль-Бухари)."},

  {id:"new_si10",cat:"sira",age:"all",diff:"medium",q:"Какой дядя Пророка ﷺ открыто воевал против Ислама и упомянут в Коране по имени?",opts:["Хамза","Аббас","Абу Лахаб","Абу Талиб"],ans:2,exp:"Абу Лахаб — единственный дядя Пророка ﷺ, упомянутый в Коране по имени как враг. Аббас (р.а.) при Бадре был среди мушриков, но позже принял Ислам и вошёл в число великих сподвижников."},

const Q_HADITH3=[
  {id:"new_h1",cat:"hadith",age:"all",diff:"easy",q:"«Каждое доброе дело — это...»",opts:["Фард","Садака","Нафиль","Желательное"],ans:1,exp:"«Каждое доброе дело — это садака» (аль-Бухари). Даже улыбка, уборка мусора, добрые слова."},
  {id:"new_h2",cat:"hadith",age:"all",diff:"medium",q:"Пророк ﷺ: «Крепкий — тот, кто не даёт гневу...»",opts:["Закипеть","Взять верх над ним","Проявляться","Расти"],ans:1,exp:"«Не тот силён, кто побеждает в борьбе, а тот, кто сдерживает себя в гневе» (аль-Бухари, №6114)."},
  {id:"new_h3",cat:"hadith",age:"all",diff:"medium",q:"«Бойтесь Аллаха везде и вслед за плохим поступком сделайте...»",opts:["Покаяние","Хорошее","Намаз","Садака"],ans:1,exp:"«Бойтесь Аллаха везде. После плохого поступка — сделай хорошее, оно сотрёт его» (Тирмизи, №1987)."},
  {id:"new_h4",cat:"hadith",age:"all",diff:"hard",q:"Пророк ﷺ назвал три дела, которые не прерываются после смерти. Третье — это?",opts:["Намаз","Пост","Праведный ребёнок, молящийся за него","Хадж"],ans:2,exp:"«Когда умирает человек: непрерывная садака, знание которым пользуются, и праведный ребёнок, молящийся за него» (Муслим)."},
  {id:"new_h5",cat:"hadith",age:"all",diff:"easy",q:"«Кто не благодарит людей — тот не благодарит...»",opts:["Природу","Аллаха","Пророков","Ангелов"],ans:1,exp:"«Не благодарит Аллаха тот, кто не благодарит людей» (Абу Дауд, №4811). Благодарность людям — форма благодарности Аллаху."},
  {id:"new_h6",cat:"hadith",age:"all",diff:"medium",q:"«Навещать больного — это право мусульманина перед...»",opts:["Имамом","Братом мусульманином","Правителем","Учёным"],ans:1,exp:"«Права мусульманина перед мусульманином: приветствовать, отвечать на приглашение, навещать больного...» (аль-Бухари)."},
  {id:"new_h7",cat:"hadith",age:"all",diff:"hard",q:"Пророк ﷺ о чём сказал: «Это мать болезней»?",opts:["Гнев","Жадность","Переедание","Зависть"],ans:2,exp:"«Желудок — это сосуд тела. Переедание — мать всех болезней». Умеренность в еде — Сунна."},
  {id:"new_h8",cat:"hadith",age:"all",diff:"medium",q:"Пророк ﷺ: «Воистину, Аллах записывает добрые дела и грехи. Кто намерился сделать доброе — получает...»",opts:["Ничего","Одно добро, а если совершит — десять и больше","Только при выполнении","Одно"],ans:1,exp:"«Кто намерился — получает одно добро. Кто совершил — от 10 до 700 и более» (аль-Бухари, Муслим)."},
  {id:"new_h9",cat:"hadith",age:"all",diff:"easy",q:"«Нет зависти кроме как в двух случаях...» — в каких?",opts:["В знании и богатстве","В богатстве и красоте","Человек дал знание и учит, и человек дал богатство и тратит","В посте и намазе"],ans:2,exp:"«Нет зависти (гыбта — одобрительная) кроме как в двух: в человеке, которому Аллах дал знание и он обучает, и в человеке с богатством, который тратит во благо» (аль-Бухари, №1409)."},
  {id:"new_h10",cat:"hadith",age:"all",diff:"hard",q:"Что Пророк ﷺ назвал «вратами добра»?",opts:["Намаз","Пост","Терпение","Садака"],ans:2,exp:"«Пост — это щит, а терпение — это врата (путь) к добру» (Ибн Маджа). Терпение — основа любой добродетели."},
  {id:"new_h11",cat:"hadith",age:"all",diff:"medium",q:"«Наилучшие из вас те, кто...»",opts:["Самые богатые","Изучают Коран и обучают ему","Больше постятся","Дольше молятся"],ans:1,exp:"«Наилучший из вас тот, кто изучил Коран и обучает ему» (аль-Бухари, №5027)."},
  {id:"new_h12",cat:"hadith",age:"all",diff:"easy",q:"Пророк ﷺ о сыне Адама: «Ни один сосуд не хуже...»",opts:["Жадного сердца","Наполненного желудка","Лживого рта","Завистливого взора"],ans:1,exp:"«Достаточно сыну Адама нескольких кусочков, которые выпрямят его спину. Если же нет — треть для еды, треть для питья, треть для воздуха» (Тирмизи)."},
];

const Q_QURAN3=[
  {id:"new_q1",cat:"quran",age:"all",diff:"easy",q:"Сколько сур в Коране начинается с «Бисмилляхир-рахманир-рахим»?",opts:["99","113","114","112"],ans:1,exp:"113 из 114 сур начинаются с «БисмиллАх». Исключение — сура Ат-Тавба (9). Зато в суре Ан-Намль БисмиллАх встречается дважды."},

  {id:"new_q7",cat:"quran",age:"all",diff:"medium",q:"Какая сура посвящена Дню суда и называется «Аль-Карила»?",opts:["101-я","100-я","99-я","102-я"],ans:0,exp:"Аль-Карила (101) — «Страшное событие». Описывает ужас Судного дня, когда люди разлетятся как мотыльки."},

  {id:"new_fq9",cat:"fiqh",age:"all",diff:"medium",q:"Что означает «рукн» в намазе?",opts:["Желательное действие","Столп — обязательный элемент без которого намаз недействителен","Сунна намаза","Форма намаза"],ans:1,exp:"Рукн — столп намаза. Без любого из рукнов намаз недействителен. Например: такбир, кийам, кираат, рукуу, суджуд."},

  {id:"new_ah3",cat:"ahlaq",age:"all",diff:"easy",q:"Что говорит Ислам о зависти (хасад)?",opts:["Это нормально","Это запрещено — пожелание гибели блага другому","Это допустимо","Это поощряется"],ans:1,exp:"Хасад — зависть (пожелание лишить другого блага) — запрещена. «Берегитесь зависти — она пожирает добрые дела, как огонь пожирает дрова» (Абу Дауд)."},
  {id:"new_ah4",cat:"ahlaq",age:"all",diff:"medium",q:"Что такое «ихсан» по смыслу хадиса Джибриля?",opts:["Просто добрые дела","Поклоняться Аллаху, как будто видишь Его","Знание фикха","Намаз"],ans:1,exp:"Пророк ﷺ сказал: «Ихсан — поклоняться Аллаху так, будто ты видишь Его. Если не видишь — знай, что Он видит тебя» (Муслим, №8)."},

  {id:"new2_h4",cat:"hadith",age:"all",diff:"medium",q:"Пророк ﷺ: «Не входит в Рай тот, в сердце которого...»",opts:["Грехи","Хотя бы пылинка гордыни","Сомнения","Страх"],ans:1,exp:"«Не войдёт в Рай тот, в сердце которого есть хотя бы пылинка гордыни» (Муслим, №91). Кибр — страшный грех."},

  {id:"new2_h12",cat:"hadith",age:"all",diff:"medium",q:"«Самое тяжёлое на весах в Судный день — что?»",opts:["Намаз","Коран","Хороший нрав","Закят"],ans:2,exp:"«Нет ничего тяжелее на весах в Судный день, чем хороший нрав» (Абу Дауд, Тирмизи). Хороший характер перевесит многое."},

  {id:"hd10",arabic:"تَبَسُّمُكَ فِي وَجْهِ أَخِيكَ لَكَ صَدَقَةٌ",trans:"Табассумука фи уаджхи ахика лака садака",text:"Твоя улыбка в лицо брату — это для тебя садака.",source:"Тирмизи №1956",topic:"Нравственность"},
  {id:"hd11",arabic:"لَيْسَ الشَّدِيدُ بِالصُّرَعَةِ",trans:"Лайсаш-шадиду бис-суръа",text:"Сильный — не тот, кто побеждает в борьбе, а тот, кто сдерживает себя в гневе.",source:"аль-Бухари №6114",topic:"Гнев"},
  {id:"hd12",arabic:"إِيَّاكُمْ وَالْحَسَدَ",trans:"Иййакум уаль-хасад",text:"Берегитесь зависти — она пожирает добрые дела, как огонь пожирает дрова.",source:"Абу Дауд №4903",topic:"Зависть"},
  {id:"hd13",arabic:"الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ",trans:"Аль-Муслиму ман салима-ль-муслимуна мин лисанихи уа йадих",text:"Мусульманин — тот, от чьего языка и рук в безопасности другие мусульмане.",source:"аль-Бухари №10",topic:"Нравственность"},
  {id:"hd14",arabic:"لَا تَغْضَبْ",trans:"Ля тагдаб",text:"Не гневайся. Пророк ﷺ повторил это три раза: «Не гневайся».",source:"аль-Бухари №6116",topic:"Гнев"},
  {id:"hd15",arabic:"اتَّقِ اللهَ حَيْثُمَا كُنْتَ",trans:"Иттакиллаха хайсума кунт",text:"Бойся Аллаха, где бы ты ни был. После плохого — сделай хорошее, оно сотрёт его. Обращайся с людьми по-доброму.",source:"Тирмизи №1987",topic:"Богобоязненность"},

  // ═══ СЕМЬЯ И ОТНОШЕНИЯ ═══
  {id:"hd16",arabic:"الْجَنَّةُ تَحْتَ أَقْدَامِ الأُمَّهَاتِ",trans:"Аль-джаннату тахта акдамиль-уммахат",text:"Рай находится под ногами матерей.",source:"Ибн Маджа №2781",topic:"Семья"},
  {id:"hd17",arabic:"خَيْرُكُمْ خَيْرُكُمْ لِأَهْلِهِ",trans:"Хайрукум хайрукум ли-ахлих",text:"Лучший из вас — тот, кто лучший для своей семьи. И я лучший для своей семьи.",source:"Тирмизи №3895",topic:"Семья"},
  {id:"hd18",arabic:"حَقُّ الْوَلَدِ عَلَى الْوَالِدِ",trans:"Хаккуль-уалади аляль-уалид",text:"Право ребёнка на отца: хорошее имя, хорошее воспитание и обучение.",source:"аль-Байхаки",topic:"Дети"},
  {id:"hd19",arabic:"مَنْ كَانَ يُؤْمِنُ بِاللهِ وَالْيَوْمِ الآخِرِ فَلْيُكْرِمْ جَارَهُ",trans:"Ман кана юмину биллахи фальюкрим джарах",text:"Кто верует в Аллаха и Судный день — пусть чтит своего соседа.",source:"аль-Бухари №6019",topic:"Сосед"},
  {id:"hd20",arabic:"لَا تَحَاسَدُوا وَلَا تَبَاغَضُوا وَكُونُوا عِبَادَ اللهِ إِخْوَانًا",trans:"Ля тахасаду уа ля табагаду уа куну ибадаллахи ихвана",text:"Не завидуйте друг другу, не враждуйте и будьте братьями, о рабы Аллаха!",source:"аль-Бухари №6065",topic:"Братство"},
  {id:"hd21",arabic:"أَدِّ الأَمَانَةَ إِلَى مَنِ ائْتَمَنَكَ",trans:"Аддиль-аманата ила мани-таманак",text:"Выполняй доверенное тебе и не предавай того, кто предал тебя.",source:"Абу Дауд №3535",topic:"Доверие"},
  {id:"hd22",arabic:"إِيَّاكُمْ وَالظَّنَّ",trans:"Иййакум уаз-занн",text:"Берегитесь подозрения — ибо подозрение есть самая лживая из речей.",source:"аль-Бухари №6064",topic:"Отношения"},

  // ═══ БИЗНЕС И ЧЕСТНОСТЬ ═══
  {id:"hd23",arabic:"التَّاجِرُ الصَّدُوقُ الأَمِينُ مَعَ النَّبِيِّينَ",trans:"Ат-таджирус-садукуль-амину маан-набиййин",text:"Честный и правдивый торговец будет вместе с пророками, праведниками и мучениками.",source:"Тирмизи №1209",topic:"Бизнес"},
  {id:"hd24",arabic:"مَنْ غَشَّنَا فَلَيْسَ مِنَّا",trans:"Ман гашшана фа-ляйса минна",text:"Кто обманывает нас — тот не из нас.",source:"Муслим №101",topic:"Честность"},
  {id:"hd25",arabic:"الْبَيِّعَانِ بِالْخِيَارِ مَا لَمْ يَتَفَرَّقَا",trans:"Аль-байи'ани биль-хийари ма лям йатафаррака",text:"Продавец и покупатель имеют право отказаться от сделки, пока не разошлись.",source:"аль-Бухари №2079",topic:"Торговля"},
  {id:"hd26",arabic:"إِنَّ اللهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ",trans:"Иннааллаха юхиббу иза амиля ахадукум амалян ан йутканах",text:"Поистине, Аллах любит, когда кто-то из вас делает дело — делает его мастерски и качественно.",source:"Байхаки",topic:"Качество работы"},
  {id:"hd27",arabic:"لَا ضَرَرَ وَلَا ضِرَارَ",trans:"Ля дарара уа ля дирар",text:"Нет вреда и нет причинения вреда другому. Один из основных принципов исламского права.",source:"Ибн Маджа №2340",topic:"Право"},
  {id:"hd28",arabic:"يَدُ اللهِ مَعَ الْجَمَاعَةِ",trans:"Йадуллахи маал-джамаа",text:"Рука Аллаха над общиной. Держитесь вместе и остерегайтесь разделения.",source:"Тирмизи №2167",topic:"Единство"},
  {id:"hd29",arabic:"أَعْطُوا الأَجِيرَ أَجْرَهُ قَبْلَ أَنْ يَجِفَّ عَرَقُهُ",trans:"Аъту аль-аджира аджрах кабля ан йаджиффа арак",text:"Выплачивайте работнику его вознаграждение до того, как высохнет его пот.",source:"Ибн Маджа №2443",topic:"Работа"},
  {id:"hd30",arabic:"خَيْرُ النَّاسِ أَنْفَعُهُمْ لِلنَّاسِ",trans:"Хайрун-наси анфаухум лин-нас",text:"Лучший из людей — тот, кто приносит больше пользы людям.",source:"Табарани",topic:"Польза"},

  // ═══ ЗНАНИЕ И МУДРОСТЬ ═══
  {id:"hd31",arabic:"طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ",trans:"Талябуль-ильми фаридатун аля кулли муслим",text:"Стремление к знанию — обязанность каждого мусульманина.",source:"Ибн Маджа №224",topic:"Знание"},
  {id:"hd32",arabic:"مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ",trans:"Ман салака тарикан йальтамису фихи ильман саххалаллаху",text:"Кто идёт по пути в поисках знания — Аллах облегчает ему путь в Рай.",source:"Муслим №2699",topic:"Знание"},
  {id:"hd33",arabic:"خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ",trans:"Хайрукум ман таалляма-ль-Куран уа аллямах",text:"Лучший из вас — тот, кто изучил Коран и обучает ему других.",source:"аль-Бухари №5027",topic:"Коран"},
  {id:"hd34",arabic:"الْعُلَمَاءُ وَرَثَةُ الأَنْبِيَاءِ",trans:"Аль-уляма уарасатуль-анбийа",text:"Учёные — наследники пророков. Пророки не оставляли в наследство динар или дирхам — только знание.",source:"Абу Дауд №3641",topic:"Знание"},
  {id:"hd35",arabic:"كُنْ عَالِمًا أَوْ مُتَعَلِّمًا أَوْ مُسْتَمِعًا",trans:"Кун алиман ав мутааллиман ав мустамиан",text:"Будь учёным, или учеником, или слушателем знания. Не будь четвёртым — погибнешь.",source:"Байхаки",topic:"Знание"},

  // ═══ ПОКЛОНЕНИЕ И ДУХОВНОСТЬ ═══
  {id:"hd36",arabic:"أَقْرَبُ مَا يَكُونُ الْعَبْدُ مِنْ رَبِّهِ وَهُوَ سَاجِدٌ",trans:"Акрабу ма йакунуль-абду мин раббихи уа хуа саджид",text:"Ближе всего раб к своему Господу тогда, когда он находится в земном поклоне.",source:"Муслим №482",topic:"Намаз"},
  {id:"hd37",arabic:"رَكْعَتَا الْفَجْرِ خَيْرٌ مِنَ الدُّنْيَا وَمَا فِيهَا",trans:"Ракаталь-фаджри хайрун минад-дунья уа ма фиха",text:"Два ракаата фаджра лучше, чем весь этот мир и всё, что в нём.",source:"Муслим №725",topic:"Намаз"},
  {id:"hd38",arabic:"مَنْ صَامَ رَمَضَانَ إِيمَانًا وَاحْتِسَابًا",trans:"Ман сама Рамадана иманан уа-хтисабан",text:"Кто постился в Рамадан с верой и надеждой на награду — тому простятся его прежние грехи.",source:"аль-Бухари №38",topic:"Рамадан"},
  {id:"hd39",arabic:"الصَّلَاةُ عِمَادُ الدِّينِ",trans:"Ас-саляту имадуд-дин",text:"Намаз — опора религии. Кто поставил её — поставил религию. Кто оставил — разрушил религию.",source:"Байхаки",topic:"Намаз"},
  {id:"hd40",arabic:"أَفْضَلُ الذِّكْرِ لَا إِلَهَ إِلَّا اللهُ",trans:"Афдалюз-зикри Ля иляха иллАллах",text:"Лучший зикр — «Ля иляха иллАллах». Лучшая дуа — «АльхамдулиллАх».",source:"Тирмизи №3383",topic:"Зикр"},
  {id:"hd41",arabic:"أَحَبُّ الْبِلَادِ إِلَى اللهِ مَسَاجِدُهَا",trans:"Ахаббуль-билади иляллахи масаджидуха",text:"Самые любимые места для Аллаха — мечети. Самые ненавистные — рынки.",source:"Муслим №671",topic:"Мечеть"},
  {id:"hd42",arabic:"مَنْ قَرَأَ آيَةَ الْكُرْسِيِّ دُبُرَ كُلِّ صَلَاةٍ",trans:"Ман кара Аяталь-Курсийи дубура кулли саля",text:"Кто читает Аят аль-Курси после каждой обязательной молитвы — ничто не помешает ему войти в Рай, кроме смерти.",source:"Насаи",topic:"Аят аль-Курси"},
  {id:"hd43",arabic:"إِنَّ اللهَ وَتْرٌ يُحِبُّ الْوَتْرَ",trans:"Иннааллаха витрун юхиббуль-витр",text:"Поистине, Аллах нечётный и любит нечётное. Поэтому читайте витр, о люди Корана.",source:"аль-Бухари №6410",topic:"Витр"},

  // ═══ САДАКА И БЛАГОТВОРИТЕЛЬНОСТЬ ═══
  {id:"hd44",arabic:"الصَّدَقَةُ تُطْفِئُ الْخَطِيئَةَ كَمَا يُطْفِئُ الْمَاءُ النَّارَ",trans:"Ас-садакату тутфиуль-хатиата кама йутфиуль-маун-нар",text:"Садака гасит грех, как вода гасит огонь.",source:"Тирмизи №2616",topic:"Садака"},
  {id:"hd45",arabic:"كُلُّ مَعْرُوفٍ صَدَقَةٌ",trans:"Куллю маруфин садака",text:"Каждое доброе дело — это садака.",source:"аль-Бухари №2989",topic:"Садака"},
  {id:"hd46",arabic:"مَا نَقَصَتْ صَدَقَةٌ مِنْ مَالٍ",trans:"Ма накасат садакатун мин маль",text:"Садака не уменьшает имущество. Аллах увеличивает его тому, кто прощает и даёт.",source:"Муслим №2588",topic:"Садака"},
  {id:"hd47",arabic:"إِذَا مَاتَ ابْنُ آدَمَ انْقَطَعَ عَمَلُهُ إِلَّا مِنْ ثَلَاثَةٍ",trans:"Иза мата-бну Адам инкатаа амалуху илля мин салас",text:"Когда умирает человек, его дела прерываются, кроме трёх: непрерывной садака, знания которым пользуются, и праведного ребёнка, молящегося за него.",source:"Муслим №1631",topic:"Садака"},
  {id:"hd48",arabic:"اتَّقُوا النَّارَ وَلَوْ بِشِقِّ تَمْرَةٍ",trans:"Иттакун-нара уа лав би-шикки тамра",text:"Спасайтесь от огня хотя бы половиной финика (в качестве садака).",source:"аль-Бухари №1413",topic:"Садака"},

  // ═══ ЗДОРОВЬЕ И ТЕЛО ═══
  {id:"hd49",arabic:"نِعْمَتَانِ مَغْبُونٌ فِيهِمَا كَثِيرٌ مِنَ النَّاسِ",trans:"Нигматани магбунун фихима касирун минан-нас",text:"Два блага, которыми большинство людей пренебрегает: здоровье и свободное время.",source:"аль-Бухари №6412",topic:"Здоровье"},
  {id:"hd50",arabic:"لَا ضَرَرَ وَلَا ضِرَارَ",trans:"Ля дарара уа ля дирар",text:"Нет вреда и нет причинения вреда. Основа исламской медицинской этики.",source:"Ибн Маджа №2340",topic:"Здоровье"},
  {id:"hd51",arabic:"إِنَّ لِجَسَدِكَ عَلَيْكَ حَقًّا",trans:"Инна ли-джасадика алайка хакка",text:"Твоё тело имеет право на тебя. Спи, отдыхай — это обязанность перед собой.",source:"аль-Бухари №1975",topic:"Здоровье"},
  {id:"hd52",arabic:"مَا مَلَأَ آدَمِيٌّ وِعَاءً شَرًّا مِنْ بَطْنٍ",trans:"Ма маля адамиййун уиаан шаррран мин батн",text:"Нет сосуда хуже, который наполняет человек, чем живот. Треть для еды, треть для воды, треть для воздуха.",source:"Тирмизи №2380",topic:"Умеренность"},

  // ═══ ЛИДЕРСТВО И ОТВЕТСТВЕННОСТЬ ═══
  {id:"hd53",arabic:"كُلُّكُمْ رَاعٍ وَكُلُّكُمْ مَسْئُولٌ عَنْ رَعِيَّتِهِ",trans:"Куллукум раин уа куллукум масъулун ан раийятих",text:"Каждый из вас пастырь, и каждый ответственен за свою паству. Руководитель — за народ, отец — за семью.",source:"аль-Бухари №893",topic:"Лидерство"},
  {id:"hd54",arabic:"أَلَا كُلُّكُمْ رَاعٍ",trans:"Аля куллукум раин",text:"Знайте, каждый из вас — ответственный. Правитель за народ, муж за семью, каждый за то, что ему доверено.",source:"аль-Бухари №2409",topic:"Ответственность"},
  {id:"hd55",arabic:"أَفْضَلُ الْجِهَادِ كَلِمَةُ حَقٍّ عِنْدَ سُلْطَانٍ جَائِرٍ",trans:"Афдалюль-джихади калимату хаккин инда султанин джаир",text:"Лучший джихад — сказать слово истины несправедливому правителю.",source:"Абу Дауд №4344",topic:"Справедливость"},
  {id:"hd56",arabic:"إِنَّ مِنْ أَشَدِّ النَّاسِ عَذَابًا يَوْمَ الْقِيَامَةِ",trans:"Инна мин ашаддин-наси азабан йавмаль-кийама",text:"Самые суровые наказания в Судный день — у несправедливых правителей.",source:"Муслим",topic:"Справедливость"},

  // ═══ ИСПЫТАНИЯ И ТЕРПЕНИЕ ═══
  {id:"hd57",arabic:"عَجَبًا لِأَمْرِ الْمُؤْمِنِ",trans:"Аджабан ли-амриль-муъмин",text:"Удивительно дело верующего! Всё для него благо: если его постигает радость — благодарит, если горе — терпит. Это только для верующего.",source:"Муслим №2999",topic:"Терпение"},
  {id:"hd58",arabic:"مَا يُصِيبُ الْمُؤْمِنَ مِنْ وَصَبٍ وَلَا نَصَبٍ",trans:"Ма йусибуль-муъмина мин уасабин уа ля насаб",text:"Не постигает верующего болезнь, усталость, беспокойство — даже укол иглой, кроме как Аллах прощает ему грехи.",source:"аль-Бухари №5641",topic:"Испытания"},
  {id:"hd59",arabic:"إِنَّ عِظَمَ الْجَزَاءِ مَعَ عِظَمِ الْبَلَاءِ",trans:"Инна изамаль-джазаи маа изамиль-баляй",text:"Великость награды соответствует великости испытания. Кого Аллах любит — испытывает.",source:"Тирмизи №2396",topic:"Испытания"},
  {id:"hd60",arabic:"الصَّبْرُ عِنْدَ الصَّدْمَةِ الأُولَى",trans:"Ас-сабру инда-с-садматиль-уля",text:"Настоящее терпение — в первый момент удара. (Именно тогда, когда больнее всего.)",source:"аль-Бухари №1283",topic:"Терпение"},

  // ═══ ПОКАЯНИЕ ═══
  {id:"hd61",arabic:"كُلُّ ابْنِ آدَمَ خَطَّاءٌ وَخَيْرُ الْخَطَّائِينَ التَّوَّابُونَ",trans:"Куллю-бни Адама хаттаун уа хайруль-хаттаина ат-таввабун",text:"Каждый сын Адама ошибается. Лучший из ошибающихся — тот, кто кается.",source:"Тирмизи №2499",topic:"Покаяние"},

}

// --- PARTICLES ------------------------------------------------
function Particles({type="correct",onDone}){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const n=type==="levelup"?50:type==="superBonus"?70:25;
    const colors=type==="wrong"?["#ff4444","#ff8800"]:type==="league"?["#FFD700","#FFF9C4","#FF8C00","#FFFFFF"]:["#FFD700","#FFF9C4","#fff","#4CAF50","#42A5F5"];
    for(let i=0;i<n;i++){
      const p=document.createElement("div"),sz=Math.random()*12+4;
      p.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};border-radius:50%;left:50%;top:50%;animation:particle 1.2s ease-out forwards;--tx:${Math.random()*400-200}px;--ty:${Math.random()*-300-50}px;--rot:${Math.random()*720}deg;animation-delay:${Math.random()*.4}s`;
      el.appendChild(p);
    }
    const t=setTimeout(()=>onDone&&onDone(),1400);
    return()=>clearTimeout(t);
  },[]);
  return <div ref={ref} style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"visible",zIndex:100}}/>;
}

  return(
    <div style={{background:L?"rgba(0,100,0,.06)":"rgba(255,215,0,.08)",border:`1px solid ${L?"rgba(0,100,0,.2)":"rgba(255,215,0,.2)"}`,borderRadius:12,padding:"10px 14px",overflow:"hidden",minHeight:50}}>
      <div key={idx} style={{animation:"tipSlide 3.5s ease forwards",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:14,color:L?"#B8860B":"#FFD700",fontFamily:"serif",flexShrink:0}}>نور</span>
        <p style={{color:L?"#1A237E":"#FFF9C4",fontSize:13,margin:0,lineHeight:1.4}}>{TIPS[idx].text}</p>

      <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:6}}>
        {TIPS.map((_,i)=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:i===idx?(L?"#B8860B":"#FFD700"):(L?"rgba(0,0,0,.15)":"rgba(255,215,0,.25)"),transition:"background .3s"}}/>)}

function QuizScreen({player,onUpdatePlayer,onBack}){
  const theme=player.settings?.theme||"dark";
  const [qIdx,setQIdx]=useState(0);
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const [maxStreak,setMaxStreak]=useState(0);
  const [correctCount,setCorrectCount]=useState(0);
  const [phase,setPhase]=useState("question");
  const [selected,setSelected]=useState(null);
  const [particles,setParticles]=useState(false);
  const [pType,setPType]=useState("correct");
  const [feedback,setFeedback]=useState(null);
  const [matchSel,setMatchSel]=useState({left:null,right:null});
  const [matchedPairs,setMatchedPairs]=useState([]);
  const [shuffledRight,setShuffledRight]=useState([]);
  const [shuffledOpts,setShuffledOpts]=useState(null); // {opts, correctNewIdx}
  const [hintUsed,setHintUsed]=useState(false);
  const [eliminated,setEliminated]=useState([]);
  const [hintCoins,setHintCoins]=useState(player.hintCoins||0);
  const [lives,setLives]=useState(3);
  const [showLostLife,setShowLostLife]=useState(false);
  const [showGameOver,setShowGameOver]=useState(false);
  const [showSpendTreasure,setShowSpendTreasure]=useState(null); // 'life' | 'hint'
  const [showHintTip,setShowHintTip]=useState(false);
  const [startTime]=useState(Date.now());
  const [showLeagueUp,setShowLeagueUp]=useState(false);
  const [showAchPopup,setShowAchPopup]=useState(null);
  const [showTreasure,setShowTreasure]=useState(null);
  const [showFullExp,setShowFullExp]=useState(false);
  const [showReport,setShowReport]=useState(false);
  const [reportText,setReportText]=useState("");
  const [reportSent,setReportSent]=useState(false);
  const phaseRef=useRef("question");
  const catScoreRef=useRef({});
  const correctIdsRef=useRef([]);
  const totalQ=10;

  // Build pool with smart filtering: skill-level + mastered cooldown + variety
  const poolRef=useRef(null);
  const matchPoolRef=useRef(null);
  if(!poolRef.current){
    const mastered=player.masteredQ||{};
    const masteredDate=player.masteredDate||{};
    const masteredRounds=player.masteredRounds||{}; // кол-во раундов с момента последнего верного ответа
    const NOW=Date.now();
    const COOLDOWN_DAYS=14; // не показывать выученный вопрос 14 дней
    const COOLDOWN_MS=COOLDOWN_DAYS*86400000;
    const COOLDOWN_ROUNDS=15; // И минимум 15 раундов
    const skill=player.skill||"intermediate";
    // Difficulty preferences based on skill
    const diffWeight={
      beginner:{easy:0.7,medium:0.25,hard:0.05},
      intermediate:{easy:0.3,medium:0.5,hard:0.2},
      advanced:{easy:0.1,medium:0.35,hard:0.55}
    }[skill]||{easy:0.3,medium:0.5,hard:0.2};

    // Filter out mastered within cooldown
    const isAvailable=q=>{
      const count=mastered[q.id]||0;
      const lastDate=masteredDate[q.id]||0;
      const roundsSince=(masteredRounds&&masteredRounds[q.id])||999;
      if(count>=3){
        const timeOk=(NOW-lastDate)>=COOLDOWN_MS;
        const roundsOk=roundsSince>=COOLDOWN_ROUNDS;
        if(!timeOk||!roundsOk)return false;
      }
      return true;
    };

    // Group by difficulty, then sample proportionally
    const allWithFill=[...ALL_Q,...Q_FILL.map(f=>({...f,_isFill:true}))];
    const available=allWithFill.filter(isAvailable);

    // If too few available, ignore cooldown but still avoid 3+ in last 24h
    let workingPool;
    if(available.length<totalQ*3){
      workingPool=allWithFill.filter(q=>{
        const count=mastered[q.id]||0;
        const lastDate=masteredDate[q.id]||0;
        return !(count>=3&&(NOW-lastDate)<86400000);
      });
    } else {
      workingPool=available;
    }

    // Sort by mastery count (less mastered = priority)
    workingPool.sort((a,b)=>{
      const ma=mastered[a.id]||0,mb=mastered[b.id]||0;
      if(ma!==mb)return ma-mb;
      return Math.random()-0.5;
    });

    // Distribute by difficulty
    const byDiff={easy:[],medium:[],hard:[]};
    workingPool.forEach(q=>{
      const d=q.diff||"medium";
      if(byDiff[d])byDiff[d].push(q);
    });

    // Build final pool  -  about 30 questions with proper distribution
    const targetSize=Math.max(30,totalQ*4);
    const want={
      easy:Math.round(targetSize*diffWeight.easy),
      medium:Math.round(targetSize*diffWeight.medium),
      hard:Math.round(targetSize*diffWeight.hard)
    };
    const pool=[];
    Object.entries(want).forEach(([d,n])=>{
      pool.push(...byDiff[d].slice(0,n));
    });
    // Fill remaining if not enough of some difficulty
    if(pool.length<targetSize){
      const remaining=workingPool.filter(q=>!pool.includes(q));
      pool.push(...remaining.slice(0,targetSize-pool.length));
    }
    poolRef.current=shuffle(pool);

    if(poolRef.current.length<totalQ){
      // Last resort: reset and use any questions
      poolRef.current=shuffle([...ALL_Q,...Q_FILL]);
    }
  }
  if(!matchPoolRef.current){
    matchPoolRef.current=shuffle(Q_MATCH);
  }

  const getQ=useCallback(i=>{
    if(i%6===5&&matchPoolRef.current.length>0)return{...matchPoolRef.current[i%matchPoolRef.current.length],_type:"matching"};
    const base=poolRef.current[i%poolRef.current.length];
    return{...base,_type:base.fill||base._isFill?"fill":"quiz"};
  },[]);

  const q=getQ(qIdx);

  useEffect(()=>{
    phaseRef.current="question";setPhase("question");
    setSelected(null);setFeedback(null);setHintUsed(false);setEliminated([]);
    setShowFullExp(false);setShowReport(false);setReportText("");setReportSent(false);
    if(q._type==="matching"){
      setShuffledRight(shuffle(q.pairs.map(p=>p.r)));
      setMatchedPairs([]);setMatchSel({left:null,right:null});
      setShuffledOpts(null);
    } else if(q.opts||q.options){
      const rawOpts=q.opts||q.options||[];
      const ans=q.ans!==undefined?q.ans:q.correct;
      // Перемешиваем варианты, отслеживая новый индекс правильного ответа
      const indexed=rawOpts.map((o,i)=>({o,i}));
      const shuffled=shuffle(indexed);
      const newCorrectIdx=shuffled.findIndex(x=>x.i===ans);
      setShuffledOpts({opts:shuffled.map(x=>x.o),correctNewIdx:newCorrectIdx,origIndices:shuffled.map(x=>x.i)});
    } else {
      setShuffledOpts(null);
    }
  },[qIdx]);

  const doHint=()=>{
    if(hintUsed||phaseRef.current!=="question")return;
    if(hintCoins<=0){setShowHintTip(true);return;}
    const hintOpts=shuffledOpts?shuffledOpts.opts:(q.opts||q.options||[]);
    const hintAns=shuffledOpts?shuffledOpts.correctNewIdx:(q.ans!==undefined?q.ans:q.correct);
    const wrong=hintOpts.map((_,i)=>i).filter(i=>i!==hintAns);
    setEliminated(shuffle(wrong).slice(0,2));
    setHintUsed(true);const nc=hintCoins-1;setHintCoins(nc);
    onUpdatePlayer({...player,hintCoins:nc});SFX.coin();
  };

  const handleAnswer=i=>{
    if(phaseRef.current!=="question"||eliminated.includes(i))return;
    phaseRef.current="result";setPhase("result");setSelected(i);
    const ans=shuffledOpts?shuffledOpts.correctNewIdx:(q.ans!==undefined?q.ans:q.correct);
    const opts=shuffledOpts?shuffledOpts.opts:(q.opts||q.options);
    const ok=i===ans;
    const league=getLeague(player.nur);
    const bonus=league.bonus;
    if(ok){
      const ns=streak+1;setStreak(ns);
      if(ns>maxStreak)setMaxStreak(ns);
      setCorrectCount(c=>c+1);
      if(q.id)correctIdsRef.current.push(q.id);
      const mult=ns>=7?4:ns>=5?3:ns>=3?2:1;
      const diffBonus=q.diff==="hard"?2:q.diff==="medium"?1.5:1;
      const gained=Math.round(50*mult*diffBonus*bonus);
      setScore(s=>s+gained);
      catScoreRef.current[q.cat]=(catScoreRef.current[q.cat]||0)+1;
      setPType(ns>=5?"superBonus":"correct");setParticles(true);
      ns>=5?SFX.superBonus():SFX.correct();
      const praise=getPraise(score+gained,ns);
      setFeedback({correct:true,msg:praise||("Верно! +"+gained+" Нур"),gained,showPraise:!!praise});
    } else {
      const newLives=lives-1;
      setLives(newLives);
      SFX.wrong();
      setFeedback({correct:false,msg:"Неверно. Прочти объяснение ниже"});
      if(newLives<=0){
        // Небольшая задержка чтобы игрок увидел объяснение
        setTimeout(()=>setShowGameOver(true),1200);
      } else {
        setShowLostLife(true);
        setTimeout(()=>setShowLostLife(false),800);
      }
    }
  };

  const handleMatch=(side,val)=>{
    // Block during result phase to prevent race conditions
    if(phaseRef.current!=="question")return;
    SFX.click();
    const ns={...matchSel,[side]:val};setMatchSel(ns);
    if(ns.left!==null&&ns.right!==null){
      // left is the left-value string, right is the INDEX of right button
      const leftVal=ns.left;
      const rightIdx=ns.right;
      const rightVal=shuffledRight[rightIdx];
      const pair=q.pairs.find(p=>p.l===leftVal);
      if(pair&&pair.r===rightVal){
        SFX.coin();
        const nm=[...matchedPairs,{left:leftVal,rightIdx}];setMatchedPairs(nm);setMatchSel({left:null,right:null});
        if(nm.length===q.pairs.length){
          setTimeout(()=>{
            if(phaseRef.current!=="question")return;
            phaseRef.current="result";
            // Засчитываем как правильный ответ  -  исправление бага с счётчиком
            const ns2=streak+1;setStreak(ns2);
            if(ns2>maxStreak)setMaxStreak(ns2);
            setCorrectCount(c=>c+1);
            if(q.id)correctIdsRef.current.push(q.id);
            const league=getLeague(player.nur);
            const gained=Math.round(100*league.bonus);
            setScore(s=>s+gained);
            const praise=getPraise(score+gained,ns2);
            setPType(ns2>=5?"superBonus":"correct");setParticles(true);
            ns2>=5?SFX.superBonus():SFX.correct();
            setFeedback({correct:true,msg:praise||("Все пары! +"+gained+" Нур"),gained,showPraise:!!praise});
            setPhase("result");
          },400);
        }
      } else {SFX.wrong();setMatchSel({left:null,right:null});}
    }
  };

  const next=()=>{
    setParticles(false);
    if(qIdx+1>=totalQ)finishQuiz();
    else setQIdx(i=>i+1);
  };

  // Потратить сокровище
  const spendTreasure=(forWhat)=>{
    const treasures=[...(player.treasures||[])];
    // Для жизни нужен жемчуг (pearl) или выше
    // Для подсказки нужен сапфир (sapphire) или выше
    const order=['pearl','sapphire','emerald','ruby','diamond','gold_bar'];
    const minType=forWhat==='life'?'pearl':'sapphire';
    const minIdx=order.indexOf(minType);
    // Найти самое дешёвое подходящее сокровище
    let foundIdx=-1;
    for(let i=minIdx;i<order.length;i++){
      // Ищем последний индекс этого типа
      let lastFound=-1;
      for(let j=treasures.length-1;j>=0;j--){
        if(treasures[j].type===order[i]){lastFound=j;break;}
      }
      if(lastFound>=0){foundIdx=lastFound;break;}
    }
    if(foundIdx<0)return false;
    treasures.splice(foundIdx,1);
    if(forWhat==='life'){
      setLives(l=>Math.min(l+1,3));
      setShowGameOver(false);
    } else {
      const nc=hintCoins+1;setHintCoins(nc);
      onUpdatePlayer({...player,hintCoins:nc,treasures});
    }
    onUpdatePlayer({...player,treasures,hintCoins:forWhat==='hint'?hintCoins+1:hintCoins});
    SFX.coin();
    setShowSpendTreasure(null);
    return true;
  };

  // Рестарт раунда после game over
  const restartRound=()=>{
    poolRef.current=null;matchPoolRef.current=null;
    setQIdx(0);setScore(0);setStreak(0);setMaxStreak(0);setCorrectCount(0);
    setLives(3);setPhase("question");phaseRef.current="question";
    setSelected(null);setFeedback(null);setParticles(false);
    setShowGameOver(false);setShowLostLife(false);
    setShowFullExp(false);setShowReport(false);setReportText("");setReportSent(false);
    correctIdsRef.current=[];
  };

  const finishQuiz=()=>{
    phaseRef.current="summary";setPhase("summary");
    const timeSpent=Math.round((Date.now()-startTime)/1000);
    const xpG=Math.round(score*.5);
    const newNur=player.nur+score;const newXP=player.xp+xpG;
    const newLvl=Math.floor(newXP/150)+1;
    const ach=[...player.achievements];
    if(score>0&&!ach.includes("first_correct"))ach.push("first_correct");
    if(maxStreak>=3&&!ach.includes("streak_3"))ach.push("streak_3");
    if(maxStreak>=7&&!ach.includes("streak_7"))ach.push("streak_7");
    if(maxStreak>=10&&!ach.includes("streak_10"))ach.push("streak_10");
    if(newLvl>=5&&!ach.includes("level_5"))ach.push("level_5");
    if(newLvl>=10&&!ach.includes("level_10"))ach.push("level_10");
    const totalAns=player.totalAnswers+totalQ;
    if(totalAns>=100&&!ach.includes("q_100"))ach.push("q_100");
    if(correctCount===totalQ&&!ach.includes("perfect_round"))ach.push("perfect_round");
    // League system - all leagues
    const newLeague=getLeague(newNur);
    const oldLeague=getLeague(player.nur);
    const leagueAchMap={silver:"league_silver",gold:"league_gold",diamond:"league_diamond",master:"league_master",grandmaster:"league_grandmaster",legend:"league_legend"};
    if(leagueAchMap[newLeague.id]&&!ach.includes(leagueAchMap[newLeague.id]))ach.push(leagueAchMap[newLeague.id]);
    const leagueUp=newLeague.id!==oldLeague.id;
    // Update mastered questions correctly with dates and rounds
    const newMastered={...player.masteredQ||{}};
    const newMasteredDate={...player.masteredDate||{}};
    const newMasteredRounds={...player.masteredRounds||{}};
    // Увеличить счётчик раундов для ВСЕХ вопросов в пуле (не только правильных)
    const allQIds=(poolRef.current||[]).map(q=>q.id).filter(Boolean);
    allQIds.forEach(id=>{
      if(newMasteredRounds[id]!==undefined){
        newMasteredRounds[id]=(newMasteredRounds[id]||0)+1;
      }
    });
    const NOW=Date.now();
    correctIdsRef.current.forEach(id=>{
      newMastered[id]=(newMastered[id]||0)+1;
      newMasteredDate[id]=NOW;
      newMasteredRounds[id]=0; // сбросить счётчик раундов при новом правильном ответе
    });
    // === ТРЕАСУРЫ  -  выпадают за достижения ===
    const newTreasures=[...(player.treasures||[])];
    let treasureToShow=null;
    // За идеальный раунд  -  бриллиант
    if(correctCount===totalQ){
      const t={type:"diamond",name:"Бриллиант",date:Date.now(),source:"Идеальный раунд"};
      newTreasures.push(t);treasureToShow=t;
    }
    // За серию 7+  -  изумруд
    else if(maxStreak>=7){
      const t={type:"emerald",name:"Изумруд",date:Date.now(),source:`Серия x${maxStreak}`};
      newTreasures.push(t);treasureToShow=t;
    }
    // За серию 5+  -  сапфир
    else if(maxStreak>=5){
      const t={type:"sapphire",name:"Сапфир",date:Date.now(),source:`Серия x${maxStreak}`};
      newTreasures.push(t);treasureToShow=t;
    }
    // За серию 3+  -  жемчуг
    else if(maxStreak>=3){
      const t={type:"pearl",name:"Жемчуг",date:Date.now(),source:`Серия x${maxStreak}`};
      newTreasures.push(t);treasureToShow=t;
    }
    // За переход в новую лигу  -  золотой слиток
    if(leagueUp){
      const t={type:"gold_bar",name:"Золотой слиток",date:Date.now(),source:`Новая лига: ${newLeague.name}`};
      newTreasures.push(t);
      if(!treasureToShow)treasureToShow=t;
    }
    if(leagueUp){SFX.league();setShowLeagueUp(true);}
    else if(newLvl>player.level){SFX.levelUp();setPType("levelup");setParticles(true);}
    else if(treasureToShow){setTimeout(()=>setShowTreasure(treasureToShow),600);}

    onUpdatePlayer({...player,nur:newNur,xp:newXP,level:newLvl,achievements:ach,hintCoins,
      correctAnswers:player.correctAnswers+correctCount,totalAnswers:totalAns,
      masteredQ:newMastered,masteredDate:newMasteredDate,masteredRounds:newMasteredRounds,treasures:newTreasures,
      lastLogin:Date.now(),_lastRoundTime:timeSpent,_lastRoundScore:score,
      _lastRoundCorrect:correctCount,_lastRoundStreak:maxStreak,_lastRoundTotalQ:totalQ});
  };

  const catLabel={names:"Имена Аллаха",prophets:"Пророки",sira:"Сира",hadith:"Хадисы",quran:"Коран",women:"Женщины",angels:"Ангелы",jinn:"Джинны",salat:"Намаз",fiqh:"Фикх",sunnah:"Сунна в жизни",ahlaq:"Адаб и Ахлак",dua:"Дуа",ramadan:"Рамадан",mistakes:"Распространённые ошибки",companions:"Сподвижники"};
  const catColor={names:"#FFD700",prophets:"#4CAF50",sira:"#42A5F5",hadith:"#AB47BC",quran:"#FF7043",women:"#E91E63",angels:"#26C6DA",jinn:"#FF5722",salat:"#8BC34A",fiqh:"#FFB300",sunnah:"#9CCC65",ahlaq:"#26A69A",dua:"#5C6BC0",ramadan:"#FFB300",mistakes:"#EF5350",companions:"#7E57C2"};

  // Summary Screen
  if(phase==="summary"){
    const timeSpent=Math.round((Date.now()-startTime)/1000);
    const mins=Math.floor(timeSpent/60);const secs=timeSpent%60;
    const accuracy=Math.round(correctCount/totalQ*100);
    const medal=correctCount>=9?"Золото":correctCount>=7?"Серебро":correctCount>=5?"Бронза":"Участник";
    const finalPraise=getPraise(score,maxStreak);
    const league=getLeague(player.nur+score);
    return(
      <div style={getBg(theme)}>
        {particles&&<Particles type={pType} onDone={()=>setParticles(false)}/>}
        {showLeagueUp&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:24}} onClick={()=>{setShowLeagueUp(false);if(showTreasure===null){const lastT=(player.treasures||[]).slice(-1)[0];if(lastT)setShowTreasure(lastT);}}}>
            <div style={{textAlign:"center",animation:"popIn .5s ease",padding:24,maxWidth:320}} onClick={e=>e.stopPropagation()}>
              <p style={{fontSize:60,fontFamily:"serif",color:league.color,margin:0,textShadow:`0 0 30px ${league.color}`}}>◆</p>
              <h2 style={{color:league.color,fontSize:28,fontFamily:"serif",margin:"8px 0 4px"}}>Новая лига!</h2>
              <p style={{color:"#FFF9C4",fontSize:20,margin:"0 0 4px",fontWeight:"bold"}}>{league.name}</p>
              <p style={{color:"#90A4AE",fontSize:13}}>Бонус к Нуру: x{league.bonus}</p>

              {/* Подсказка родителям */}
              <div style={{marginTop:20,padding:"12px 14px",background:"rgba(76,175,80,.15)",border:"1px solid rgba(76,175,80,.4)",borderRadius:12,textAlign:"left"}}>
                <p style={{color:"#A5D6A7",fontSize:12,margin:"0 0 6px",fontWeight:"bold"}}>Совет для родителей</p>
                <p style={{color:"#C5E1A5",fontSize:12,margin:0,lineHeight:1.5}}>
                  Если ваш ребёнок достиг новой лиги  -  порадуйте его! Сладость, прогулка или книга на исламскую тему станут отличной наградой за усердие в изучении религии.
                </p>
              </div>
              <button style={{...S.primaryBtn,marginTop:16,background:`linear-gradient(135deg,${league.color},${league.color}cc)`,color:"#0A1628",fontWeight:"bold"}} onClick={()=>{setShowLeagueUp(false);const lastT=(player.treasures||[]).slice(-1)[0];if(lastT)setShowTreasure(lastT);}}>
                Продолжить
              </button>
            </div>
          </div>
        )}
        {showTreasure&&<TreasureModal treasure={showTreasure} onClose={()=>setShowTreasure(null)}/>}
        <div style={{padding:"20px 16px",animation:"slideIn .4s ease"}}>
          {/* Header */}
          <div style={{textAlign:"center",marginBottom:20}}>
            <p style={{color:"#FFD700",fontSize:48,fontFamily:"serif",margin:0,animation:"countUp .6s ease"}}>{correctCount>=9?"◆":correctCount>=7?"◇":correctCount>=5?"▲":"◉"}</p>
            <h2 style={{color:"#FFD700",fontSize:26,fontFamily:"serif",margin:"4px 0 2px"}}>Раунд завершён!</h2>
            <p style={{color:"#90A4AE",fontSize:14,margin:0}}>{medal}</p>
          </div>
          {finalPraise&&<div style={{...S.praise,marginBottom:16,animation:"slideIn .5s ease"}}>{finalPraise}</div>}
          {/* Main Stats Grid - like the screenshot */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
            {[
              {label:"Время",value:`${mins}:${String(secs).padStart(2,"0")}`,color:"#42A5F5",icon:"◷"},
              {label:"Счёт",value:score,color:"#FFD700",icon:"◆"},
              {label:"Серия",value:maxStreak,color:"#FF7043",icon:"◈"},
            ].map(s=>(
              <div key={s.label} style={{background:"rgba(255,255,255,.06)",border:`1px solid ${s.color}44`,borderRadius:14,padding:"12px 8px",textAlign:"center"}}>
                <p style={{color:"#78909C",fontSize:10,margin:"0 0 3px"}}>{s.label}</p>
                <p style={{color:s.color,fontSize:20,fontWeight:"bold",margin:0,fontFamily:"serif"}}>{s.value}</p>
              </div>
            ))}
          </div>
          {/* Detailed card */}
          <div style={{...S.card,marginBottom:16}}>
            <Row l="Правильных" v={`${correctCount}/${totalQ}`} vc="#4CAF50"/>
            <Row l="Точность" v={accuracy+"%"} vc="#4CAF50"/>
            <Row l="Нур получено" v={"+"+score} vc="#FFD700"/>
            <Row l="Уровень" v={player.level} vc="#42A5F5"/>
            <Row l="Лига" v={league.name} vc={league.color}/>
          </div>
          {correctCount===totalQ&&(
            <div style={{...S.praise,background:"linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,160,0,.15))",border:"2px solid rgba(255,215,0,.5)",marginBottom:16,animation:"glow 2s infinite"}}>
              Идеальный раунд! 10 из 10!
            </div>
          )}
          <button style={S.primaryBtn} onClick={()=>{
            poolRef.current=null;matchPoolRef.current=null;
            setQIdx(0);setScore(0);setStreak(0);setMaxStreak(0);setCorrectCount(0);
            setPhase("question");phaseRef.current="question";
            setSelected(null);setFeedback(null);setParticles(false);setShowLeagueUp(false);
          }}>Играть снова</button>
          <button style={{...S.primaryBtn,background:"#37474F",marginTop:8}} onClick={onBack}>В меню</button>
        </div>
      </div>
    );
  }

  const displayOpts=shuffledOpts?shuffledOpts.opts:(q.opts||q.options||[]);
  const displayAns=shuffledOpts?shuffledOpts.correctNewIdx:(q.ans!==undefined?q.ans:q.correct);
  const opts=displayOpts;
  const ans=displayAns;
  const diffColor=DIFF_COLOR[q.diff]||"#90A4AE";
  const diffLabel=DIFF_LABEL[q.diff]||"";

  const renderOpts=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:12}}>
      {displayOpts.map((opt,i)=>{
        const isElim=eliminated.includes(i);
        let bg=isElim?"rgba(0,0,0,.2)":"rgba(255,255,255,.05)";
        let border=isElim?"1px solid rgba(255,255,255,.04)":"1px solid rgba(255,255,255,.1)";
        if(phase==="result"){
          if(i===displayAns){bg="rgba(76,175,80,.25)";border="2px solid #4CAF50";}
          else if(i===selected&&i!==displayAns){bg="rgba(255,82,82,.2)";border="2px solid #FF5252";}
        }
        return(
          <button key={i} style={{...S.optBtn,background:bg,border,opacity:isElim?0.3:1,textDecoration:isElim?"line-through":"none"}}
            onClick={()=>handleAnswer(i)} disabled={phase==="result"||isElim}>
            <span style={S.optLetter}>{["А","Б","В","Г"][i]}</span>
            {opt}
            {isElim&&<span style={{marginLeft:"auto",fontSize:11,color:"#FF5252"}}> - </span>}
          </button>
        );
      })}
    </div>
  );

  return(
    <div style={getBg(theme)}>
      {particles&&<Particles type={pType} onDone={()=>setParticles(false)}/>}
      {showHintTip&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={()=>setShowHintTip(false)}>
          <div style={{background:"#0D2137",border:"1px solid rgba(255,215,0,.3)",borderRadius:20,padding:24,maxWidth:280,textAlign:"center"}}>
            <p style={{color:"#FFD700",fontSize:28,fontFamily:"serif",margin:"0 0 8px"}}>نور</p>
            <h3 style={{color:"#FFD700",margin:"0 0 8px"}}>Нет подсказок!</h3>
            <p style={{color:"#90A4AE",fontSize:13,lineHeight:1.5,margin:"0 0 12px"}}>Иди в <b style={{color:"#4CAF50"}}>Зикрилятор</b><br/>За каждые <b style={{color:"#FFD700"}}>99 зикров</b>  -  +1 подсказка</p>
            {(player.treasures||[]).some(t=>['sapphire','emerald','ruby','diamond','gold_bar'].includes(t.type))&&(
              <button style={{width:"100%",padding:"10px",background:"rgba(66,165,245,.15)",border:"1px solid rgba(66,165,245,.4)",borderRadius:10,color:"#42A5F5",cursor:"pointer",fontSize:13,fontFamily:"inherit",marginBottom:8}} onClick={()=>{spendTreasure('hint');setShowHintTip(false);}}>
                Потратить сапфир → +1 подсказка
              </button>
            )}
            <button style={{...S.primaryBtn,marginTop:0}} onClick={()=>setShowHintTip(false)}>Понятно!</button>
          </div>
        </div>
      )}
      {/* Game Over Modal */}
      {showGameOver&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:24}}>
          <div style={{background:"#0D2137",border:"2px solid rgba(255,82,82,.5)",borderRadius:24,padding:24,maxWidth:320,width:"100%",textAlign:"center",animation:"popIn .4s ease"}}>
            <p style={{fontSize:48,margin:"0 0 8px",color:"#FF5252",fontFamily:"serif"}}>✗</p>
            <h2 style={{color:"#FF5252",fontSize:22,margin:"0 0 8px"}}>Жизни закончились!</h2>
            <p style={{color:"#90A4AE",fontSize:13,margin:"0 0 20px",lineHeight:1.5}}>
              Счёт: <b style={{color:"#FFD700"}}>{score}</b> Нур · Серия: <b style={{color:"#FF7043"}}>{maxStreak}</b>
            </p>
            {/* Потратить сокровище */}
            {(player.treasures||[]).some(t=>['pearl','sapphire','emerald','ruby','diamond','gold_bar'].includes(t.type))&&(
              <div style={{background:"rgba(255,215,0,.08)",border:"1px solid rgba(255,215,0,.2)",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
                <p style={{color:"#FFF9C4",fontSize:12,margin:"0 0 8px"}}>Потрать сокровище  -  продолжи игру!</p>
                <button style={{width:"100%",padding:"10px",background:"linear-gradient(135deg,rgba(205,127,50,.3),rgba(255,215,0,.2))",border:"1px solid rgba(255,215,0,.4)",borderRadius:10,color:"#FFD700",cursor:"pointer",fontSize:13,fontFamily:"inherit",marginBottom:6}} onClick={()=>spendTreasure('life')}>
                  Потратить жемчуг → +1 жизнь
                </button>
              </div>
            )}
            <button style={{...S.primaryBtn,marginTop:0,background:"linear-gradient(135deg,#1976D2,#1565C0)"}} onClick={()=>{finishQuiz();setShowGameOver(false);}}>
              Завершить и получить Нур
            </button>
            <button style={{width:"100%",padding:"12px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:14,color:"#90A4AE",cursor:"pointer",fontSize:14,marginTop:8,fontFamily:"inherit"}} onClick={restartRound}>
              Начать сначала (сохранить жизни)
            </button>
          </div>
        </div>
      )}
      {/* Lost Life Flash */}
      {showLostLife&&(
        <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"rgba(255,82,82,.9)",borderRadius:20,padding:"16px 32px",zIndex:350,animation:"popIn .3s ease",pointerEvents:"none"}}>
          <p style={{color:"#fff",fontSize:20,fontWeight:"bold",margin:0}}>−1 жизнь!</p>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",padding:"16px 16px 8px",gap:8}}>
        <button style={S.backBtn} onClick={onBack}>←</button>
        <div style={{flex:1,margin:"0 8px"}}>
          <div style={S.progressBar}><div style={{...S.progressFill,width:`${(qIdx+1)/totalQ*100}%`}}/></div>
          <p style={{color:"#78909C",fontSize:11,textAlign:"center",margin:"2px 0 0"}}>{qIdx+1}/{totalQ}</p>
        </div>
        <button style={{...S.hintBtn,opacity:hintUsed?0.4:1}} onClick={doHint} disabled={hintUsed}>
          <span style={{fontSize:16,color:"#FFD700",fontFamily:"serif"}}>?</span>
          <span style={{position:"absolute",top:-5,right:-5,background:hintCoins>0?"#FFD700":"#FF5252",color:"#0A1628",borderRadius:"50%",width:16,height:16,fontSize:10,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center"}}>{hintCoins}</span>
        </button>
      </div>
      <div style={{textAlign:"center",padding:"4px 0",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
        <span style={S.scoreChip}>Нур: {score}</span>
        {streak>=2&&<span style={S.streakChip}>Серия x{streak}</span>}
        {/* Жизни */}
        <div style={{display:"flex",gap:4}}>
          {[0,1,2].map(i=>(
            <span key={i} style={{fontSize:18,filter:i<lives?"none":"grayscale(1) opacity(.3)",transition:"filter .3s",color:"#FF5252"}}>
              {i<lives?"♥":"♡"}
            </span>
          ))}
        </div>
      </div>
      {/* Category + Difficulty */}
      <div style={{textAlign:"center",marginBottom:8,display:"flex",gap:8,justifyContent:"center",alignItems:"center"}}>
        <span style={{...S.catBadge,borderColor:(catColor[q.cat]||"#666")+"55",color:catColor[q.cat]||"#90A4AE"}}>
          {catLabel[q.cat]||"Знание"}
        </span>
        {q.diff&&(
          <span style={{background:diffColor+"22",border:`1px solid ${diffColor}66`,borderRadius:20,padding:"3px 10px",fontSize:11,color:diffColor,fontWeight:q.diff==="hard"?"bold":"normal"}}>
            {diffLabel}
          </span>
        )}
      </div>

      {q._type==="quiz"&&(
        <div style={{padding:"0 16px"}}>
          <div style={{...S.qCard,borderLeft:q.diff==="hard"?`3px solid ${DIFF_COLOR.hard}`:q.diff==="medium"?`3px solid ${DIFF_COLOR.medium}`:"none"}}>
            <p style={S.qText}>{q.q||q.question}</p>
          </div>
          {renderOpts()}
        </div>
      )}
      {q._type==="fill"&&(
        <div style={{padding:"0 16px"}}>
          <div style={{...S.qCard,borderLeft:`3px solid #42A5F5`}}>
            <p style={{color:"#B0BEC5",fontSize:12,margin:"0 0 6px"}}>Закончи фразу:</p>
            <p style={{...S.qText,fontStyle:"italic",color:"#FFF9C4"}}>{q.fill||q.phrase}</p>
          </div>
          {renderOpts()}
        </div>
      )}
      {q._type==="matching"&&(
        <div style={{padding:"0 16px"}}>
          <div style={S.qCard}>
            <p style={S.qText}>{q.q||q.question}</p>
            <p style={{color:"#78909C",fontSize:12,margin:"4px 0 0"}}>Нажми слева, затем справа</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(q.pairs||[]).map((p,i)=>{
                const done=matchedPairs.some(m=>m.left===p.l);
                const isSel=matchSel.left===p.l;
                return(
                  <button key={i} style={{...S.matchBtn,background:done?"rgba(76,175,80,.3)":isSel?"rgba(255,215,0,.25)":"rgba(255,255,255,.06)",border:done?"2px solid #4CAF50":isSel?"2px solid #FFD700":"1px solid rgba(255,255,255,.12)",opacity:done?0.7:1}}
                    onClick={()=>!done&&phaseRef.current==="question"&&handleMatch("left",p.l)} disabled={done||phase==="result"}>
                    {done?"+ ":""}{p.l}
                  </button>
                );
              })}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {shuffledRight.map((r,i)=>{
                const done=matchedPairs.some(m=>m.rightIdx===i);
                const isSel=matchSel.right===i;
                return(
                  <button key={i} style={{...S.matchBtn,background:done?"rgba(76,175,80,.3)":isSel?"rgba(255,215,0,.25)":"rgba(255,255,255,.06)",border:done?"2px solid #4CAF50":isSel?"2px solid #FFD700":"1px solid rgba(255,255,255,.12)",opacity:done?0.7:1}}
                    onClick={()=>!done&&phaseRef.current==="question"&&handleMatch("right",i)} disabled={done||phase==="result"}>
                    {done?"+ ":""}{r}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}
      {feedback&&(
        <div style={{...S.feedbackBox,background:feedback.correct?"rgba(76,175,80,.15)":"rgba(255,82,82,.12)",borderColor:feedback.correct?"#4CAF50":"#FF5252",margin:"12px 16px 0"}}>
          <p style={{color:feedback.correct?"#A5D6A7":"#EF9A9A",fontWeight:"bold",margin:"0 0 6px"}}>{feedback.msg}</p>
          {(q.exp||q.explanation)&&(()=>{
            const expText=q.exp||q.explanation;
            const isLong=expText.length>120;
            const displayText=isLong&&!showFullExp?expText.substring(0,120)+"...":expText;
            return(
              <div>
                <p style={{color:"#90A4AE",fontSize:13,margin:0,lineHeight:1.6}}>{displayText}</p>
                {isLong&&(
                  <button style={{background:"transparent",border:"none",color:"#42A5F5",fontSize:12,padding:"4px 0",cursor:"pointer",fontFamily:"inherit"}} onClick={()=>{setShowFullExp(!showFullExp);SFX.click();}}>
                    {showFullExp?"Свернуть ▲":"Читать полностью ▼"}
                  </button>
                )}
              </div>
            );
          })()}
          <button style={{...S.nextBtn,marginTop:12}} onClick={next}>{qIdx+1>=totalQ?"Завершить раунд":"Следующий"}</button>
          {/* Кнопка пожаловаться */}
          {!reportSent&&(
            <button
              style={{background:"transparent",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#78909C",fontSize:11,padding:"6px 12px",cursor:"pointer",marginTop:10,fontFamily:"inherit",width:"100%"}}
              onClick={()=>{setShowReport(true);SFX.click();}}>
              Сообщить об ошибке в этом вопросе
            </button>
          )}
          {reportSent&&(
            <p style={{color:"#4CAF50",fontSize:12,margin:"10px 0 0",textAlign:"center"}}>
              Спасибо! Ваше сообщение учтено
            </p>
          )}
        </div>
      )}

      {/* Модальное окно жалобы */}
      {showReport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:24}} onClick={()=>setShowReport(false)}>
          <div style={{background:"#0D2137",border:"1px solid rgba(255,215,0,.3)",borderRadius:20,padding:20,maxWidth:340,width:"100%"}} onClick={e=>e.stopPropagation()}>
            <h3 style={{color:"#FFD700",margin:"0 0 4px",fontSize:18}}>Сообщить об ошибке</h3>
            <p style={{color:"#90A4AE",fontSize:12,margin:"0 0 12px",lineHeight:1.5}}>
              Если ответ или объяснение не соответствует Корану и достоверной Сунне  -  сообщите нам. Мы изучим и исправим.
            </p>
            <div style={{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"8px 10px",marginBottom:12}}>
              <p style={{color:"#78909C",fontSize:10,margin:"0 0 4px"}}>Вопрос:</p>
              <p style={{color:"#CFD8DC",fontSize:12,margin:0,lineHeight:1.4}}>{q.q||q.question||q.fill||q.phrase}</p>
            </div>
            <textarea
              placeholder="Опишите проблему: что неверно, ссылка на достоверный источник..."
              value={reportText}
              onChange={e=>setReportText(e.target.value)}
              style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"10px 12px",color:"#E0E0E0",fontSize:13,minHeight:80,resize:"vertical",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}
            />
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button style={{flex:1,padding:"10px",background:"#37474F",border:"none",borderRadius:10,color:"#CFD8DC",fontSize:13,cursor:"pointer"}} onClick={()=>setShowReport(false)}>Отмена</button>
              <button style={{flex:1,padding:"10px",background:"linear-gradient(135deg,#1976D2,#1565C0)",border:"none",borderRadius:10,color:"#fff",fontSize:13,cursor:"pointer",fontWeight:"bold"}} onClick={()=>{
                // Save report to player's reports
                const newReports=[...(player.reports||[]),{qId:q.id,question:q.q||q.question||q.fill||q.phrase,text:reportText,date:Date.now()}];
                onUpdatePlayer({...player,reports:newReports});
                setShowReport(false);setReportSent(true);SFX.coin();
              }}>Отправить</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DailyTasksScreen({player,onUpdatePlayer,onBack,onNav}){
  const theme=player.settings?.theme||"dark";
  const L=isLight(theme);
  const tasks=getDailyTasks();
  const progress=getDailyProgress(player);
  const today=new Date().toDateString();
  const dayNames=["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
  const todayName=dayNames[new Date().getDay()];
  const gold=L?"#B8860B":"#FFD700";
  const textC=L?"#1A237E":"#E0E0E0";
  const mutedC=L?"#546E7A":"#90A4AE";
  const cardBg=L?"rgba(0,0,0,.04)":"rgba(255,255,255,.05)";
  const cardBorder=L?"rgba(0,0,0,.1)":"rgba(255,255,255,.1)";
  const completedToday=tasks.filter(t=>progress[t.id]>=t.target).length;

  const markTask=(taskId)=>{
    const task=tasks.find(t=>t.id===taskId);
    if(!task)return;
    const newProgress={...player.dailyProgress||{}};
    if(!newProgress[today])newProgress[today]={};
    newProgress[today][taskId]=(newProgress[today][taskId]||0)+1;
    let up={...player,dailyProgress:newProgress};
    if(newProgress[today][taskId]>=task.target){
      up={...up,nur:up.nur+task.nur};
      SFX.levelUp();
    }
    onUpdatePlayer(up);
  };

  return(
    <div style={getBg(theme)}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px 8px"}}>
        <button style={{...S.backBtn,background:L?"rgba(0,0,0,.08)":"rgba(255,255,255,.08)",color:L?"#37474F":"#90A4AE"}} onClick={onBack}>←</button>
        <div>
          <h2 style={{color:gold,fontSize:18,margin:0}}>Задания дня</h2>
          <p style={{color:mutedC,fontSize:11,margin:0}}>{todayName} · {completedToday}/{tasks.length} выполнено</p>
        </div>
      </div>
      <div style={{padding:"0 16px"}}>
        {/* Прогресс дня */}
        <div style={{background:L?"rgba(0,100,0,.06)":"rgba(255,215,0,.08)",border:`1px solid ${L?"rgba(0,100,0,.2)":"rgba(255,215,0,.2)"}`,borderRadius:14,padding:"14px",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:L?"#1A237E":"#FFF9C4",fontSize:13,fontWeight:"bold"}}>Прогресс сегодня</span>
            <span style={{color:gold,fontWeight:"bold",fontSize:14}}>{completedToday}/{tasks.length}</span>
          </div>
          <div style={{height:8,background:L?"rgba(0,0,0,.1)":"rgba(255,255,255,.1)",borderRadius:4}}>
            <div style={{height:8,borderRadius:4,background:`linear-gradient(90deg,${gold},#FF8C00)`,width:`${completedToday/tasks.length*100}%`,transition:"width .5s"}}/>
          </div>
          {completedToday===tasks.length&&(
            <p style={{color:"#4CAF50",fontSize:13,margin:"8px 0 0",textAlign:"center",fontStyle:"italic"}}>
              Пусть Аллах примет твои дела и умножит награду!
            </p>
          )}
        </div>
        {/* Список заданий */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {tasks.map(task=>{
            const done=(progress[task.id]||0)>=task.target;
            const current=progress[task.id]||0;
            const pct=Math.min(100,current/task.target*100);
            return(
              <div key={task.id} style={{background:done?"rgba(76,175,80,.12)":cardBg,border:`1px solid ${done?"#4CAF50":cardBorder}`,borderRadius:14,padding:"14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:12,background:done?"rgba(76,175,80,.2)":"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:gold,fontFamily:"serif",flexShrink:0}}>
                    {done?"✓":task.icon}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <p style={{color:done?"#4CAF50":textC,fontWeight:"bold",fontSize:14,margin:0}}>{task.title}</p>
                      <span style={{color:gold,fontSize:12,fontWeight:"bold"}}>+{task.nur} Нур</span>
                    </div>
                    <p style={{color:mutedC,fontSize:12,margin:"2px 0 6px"}}>{task.desc}</p>
                    {!done&&(
                      <div style={{height:4,background:L?"rgba(0,0,0,.1)":"rgba(255,255,255,.1)",borderRadius:2}}>
                        <div style={{height:4,borderRadius:2,background:gold,width:`${pct}%`,transition:"width .3s"}}/>
                      </div>
                    )}
                    {!done&&<p style={{color:mutedC,fontSize:10,margin:"3px 0 0"}}>{current}/{task.target}</p>}
                  </div>
                </div>
                {done&&(
                  <div style={{background:"rgba(76,175,80,.1)",borderRadius:8,padding:"8px 12px",marginTop:8}}>
                    <p style={{color:"#4CAF50",fontSize:12,margin:0,fontStyle:"italic",textAlign:"center"}}>{task.praise}</p>
                  </div>
                )}
                {!done&&(
                  <button style={{width:"100%",marginTop:8,padding:"8px",background:L?"rgba(0,0,0,.06)":"rgba(255,255,255,.06)",border:`1px solid ${cardBorder}`,borderRadius:8,color:gold,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}
                    onClick={()=>{
                      SFX.click();
                      if(task.type==="quiz")onNav("quiz");
                      else if(task.type==="zikr")onNav("zikr");
                      else if(task.type==="salawat")onNav("salawat");
                      else if(task.type==="arabic")onNav("arabic");
                      else if(task.type==="hadith")onNav("hadith_daily");
                      else if(task.type==="dua")onNav("dua");
                      else if(task.type==="jaushan")onNav("jaushan");
                      else markTask(task.id);
                    }}>
                    Выполнить →
                  </button>
                )}
              </div>
            );
          })}
        </div>
        <p style={{color:mutedC,fontSize:11,textAlign:"center",marginTop:16,fontStyle:"italic"}}>
          Задания обновляются каждый день
        </p>
      </div>
    </div>
  );
}

function SalawatScreen({player,onUpdatePlayer,onBack}){
  const theme=player.settings?.theme||"dark";
  const [counts,setCounts]=useState(Array(SALAWAT_TYPES.length).fill(0));
  const [active,setActive]=useState(0);
  const [flash,setFlash]=useState(false);
  const [particles,setParticles]=useState(false);
  const sal=player.salawatCount||0;
  const total=counts.reduce((a,b)=>a+b,0);
  const s=SALAWAT_TYPES[active];
  const prog=Math.min(1,counts[active]/100);

  const tap=()=>{
    SFX.zikr();setFlash(true);setTimeout(()=>setFlash(false),130);
    const nc=[...counts];nc[active]++;setCounts(nc);
    const newT=total+1;const newSal=sal+1;
    let up={...player,salawatCount:newSal};
    if(newT%100===0){setParticles(true);SFX.superBonus();up={...up,nur:up.nur+s.reward};}
    const pm=Math.floor(sal/99),nm=Math.floor(newSal/99);
    if(nm>pm){up={...up,hintCoins:(up.hintCoins||0)+1};setParticles(true);SFX.levelUp();}
    // За каждые 200 салаватов  -  сокровище
    const pm200=Math.floor(sal/200),nm200=Math.floor(newSal/200);
    if(nm200>pm200){
      // Первые 3 раза  -  жемчуг, потом сапфир
      const tType=nm200<=3?'pearl':'sapphire';
      const newTreasures=[...(up.treasures||[]),{type:tType,name:TREASURE_TYPES[tType].name,date:Date.now(),source:`${newSal} салаватов прочитано`}];
      up={...up,treasures:newTreasures};
      setParticles(true);SFX.league();
    }
    onUpdatePlayer(up);
  };

  return(
    <div style={getBg(theme)}>
      {particles&&<Particles type="correct" onDone={()=>setParticles(false)}/>}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px 8px"}}>
        <button style={S.backBtn} onClick={onBack}>←</button>
        <div>
          <h2 style={{color:"#26C6DA",fontSize:18,margin:0}}>Салаваты Пророку ﷺ</h2>
          <p style={{color:"#78909C",fontSize:11,margin:0}}>Всего прочитано: {sal}</p>
        </div>
      </div>
      <div style={{padding:"0 16px"}}>
        <div style={{background:"rgba(0,188,212,.08)",border:"1px solid rgba(0,188,212,.25)",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
          <p style={{color:"#B2EBF2",fontSize:12,margin:0,lineHeight:1.5}}>
            Пророк ﷺ сказал: «Кто читает салават один раз  -  Аллах посылает ему 10 благословений». За каждые 100  -  Нур и подсказка!
          </p>
          {/* Прогресс до сокровища */}
          <div style={{background:"rgba(255,215,0,.08)",border:"1px solid rgba(255,215,0,.2)",borderRadius:8,padding:"8px 12px",marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#FFF9C4",fontSize:12}}>До сокровища:</span>
            <span style={{color:"#FFD700",fontSize:13,fontWeight:"bold"}}>{200-(sal%200)}/200</span>
          </div>
          <div style={{height:4,background:"rgba(255,255,255,.08)",borderRadius:2,marginTop:6}}>
            <div style={{height:4,borderRadius:2,background:"linear-gradient(90deg,#FFD700,#FF8C00)",width:`${(sal%200)/200*100}%`,transition:"width .3s"}}/>
          </div>
        </div>
        {/* Выбор вида салавата */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {SALAWAT_TYPES.map((st,i)=>(
            <button key={i} style={{padding:"10px 14px",background:active===i?st.color+"22":"rgba(255,255,255,.04)",border:`${active===i?2:1}px solid ${active===i?st.color:"rgba(255,255,255,.1)"}`,borderRadius:12,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}} onClick={()=>{setActive(i);SFX.click();}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{color:active===i?st.color:"#CFD8DC",fontSize:12,fontWeight:"bold"}}>{st.full}</span>
                <span style={{color:"#546E7A",fontSize:10}}>+{st.reward} Нур/100</span>
              </div>
              <p style={{color:st.color,fontSize:13,fontFamily:"serif",margin:"0 0 2px"}}>{st.arabic.substring(0,40)+"..."}</p>
              <p style={{color:"#90A4AE",fontSize:11,margin:0,fontStyle:"italic"}}>{st.trans.substring(0,50)}</p>
            </button>
          ))}
        </div>
        {/* Основная карточка */}
        <div style={{background:s.color+"15",border:`2px solid ${s.color}44`,borderRadius:18,padding:"16px",textAlign:"center",marginBottom:16}}>
          <p style={{color:s.color,fontSize:22,fontFamily:"serif",lineHeight:1.6,margin:"0 0 8px"}}>{s.arabic}</p>
          <p style={{color:"#FFF9C4",fontSize:13,fontStyle:"italic",margin:"0 0 4px",fontWeight:"bold"}}>{s.trans}</p>
          <p style={{color:"#90A4AE",fontSize:12,margin:"0 0 14px"}}>{s.meaning}</p>
          {s.info&&<p style={{color:"#78909C",fontSize:11,margin:"0 0 14px",lineHeight:1.5,background:"rgba(0,0,0,.2)",borderRadius:8,padding:"8px 10px"}}>{s.info}</p>}
          {/* Прогресс */}
          <div style={{position:"relative",display:"inline-block",marginBottom:10}}>
            <svg width="130" height="130" style={{transform:"rotate(-90deg)"}}>
              <circle cx="65" cy="65" r="55" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="10"/>
              <circle cx="65" cy="65" r="55" fill="none" stroke={s.color} strokeWidth="10"
                strokeDasharray={`${2*Math.PI*55}`} strokeDashoffset={`${2*Math.PI*55*(1-prog)}`}
                style={{transition:"stroke-dashoffset .3s"}} strokeLinecap="round"/>

            <button style={{position:"absolute",top:"50%",left:"50%",transform:`translate(-50%,-50%) scale(${flash?0.92:1})`,width:90,height:90,borderRadius:"50%",background:flash?s.color+"66":"rgba(255,255,255,.06)",border:`2px solid ${s.color}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"transform .1s"}} onClick={tap}>
              <span style={{fontSize:26,color:"#E0E0E0",fontFamily:"serif"}}>{counts[active]}</span>
              <span style={{fontSize:10,color:"#90A4AE"}}>Нажми</span>
            </button>
          </div>
          <p style={{color:"#78909C",fontSize:12,margin:0}}>{counts[active]}/100</p>
        </div>
        {/* Итоги сессии */}
        <div style={S.card}>
          <Row l="Сессия" v={total} vc={s.color}/>
          <Row l="Всего за всё время" v={sal} vc="#26C6DA"/>
          <Row l="Подсказки" v={(player.hintCoins||0)+" шт."} vc="#FFA726"/>
          <div style={{marginTop:6}}>
            <div style={{display:"flex",justifyContent:"space-between",color:"#546E7A",fontSize:11,marginBottom:2}}>
              <span>До следующей подсказки</span><span>{99-(sal%99)}/99</span>
            </div>
            <div style={{height:4,background:"#1E2A3A",borderRadius:2}}>
              <div style={{height:4,borderRadius:2,background:"#26C6DA",width:`${(sal%99)/99*100}%`,transition:"width .3s"}}/>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ZikrScreen({player,onUpdatePlayer,onBack}){

  const infoBg=L?"rgba(0,100,0,.06)":"rgba(255,215,0,.08)";
  const infoBorder=L?"rgba(0,100,0,.2)":"rgba(255,215,0,.2)";
  const infoText=L?"#1A237E":"#FFF9C4";

  const [active,setActive]=useState(0);
  const [flash,setFlash]=useState(false);
  const [particles,setParticles]=useState(false);
  const total=counts.reduce((a,b)=>a+b,0);
  const tap=()=>{
    SFX.zikr();setFlash(true);setTimeout(()=>setFlash(false),130);

    const newT=total+1;const newZ=player.zikrCount+1;
    let up={...player,zikrCount:newZ};
    const r=ZIKR_TYPES[active].reward;
    if(newT%100===0){setParticles(true);SFX.superBonus();up={...up,nur:up.nur+r};}
    const pm=Math.floor(player.zikrCount/99),nm=Math.floor(newZ/99);
